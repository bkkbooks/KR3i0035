body:
  text: 百菊集譜卷五宋史鑄撰淳祐丙午中夏愚始飭工為此鋟梓越旬餘又得同志陸景昭特攜赤城胡融嘗於紹熈辛亥嵗撰圖形菊譜二卷以示所恨得見之晚不及寘于其前今姑摭其要并序續為第五卷云萬物以節操為髙與春俱華與秋偕瘁者盈山滿谷騷人墨客歌詠乎古今務以句語文辭相誇尚是何足以浼吾之筆端乎哉吾之所愛者獨菊爾時維季秋霜風凄緊草木之葉或黄或瘠或槁或脱而菊也方濯濯然獨立於霜露之中含曜吐頴精采奪目與吾相對竟日冷淡而耐久瀟洒而有逺韻正可比方髙人貞士立於世道之風波操履卓絶不為威武勢力之所摧屈者矣夫其天姿髙潔獨受間氣生不與草木同流死不與草木偕逝可謂物中之英百卉之桀然者也云云菊名御袍乃人君之服故列為首御袍黄酴醾銀荔支一名太師菊金荔支大金錢小金錢添色喜容一名蘸金七寳黄又名十様黄七寳白金堆金鈴大眉心小眉心金毬銀毬龍腦桃花金盞金臺銀盞銀臺大白又名霜下菊小白夏佛羅一名佛頂菊秋佛羅甘菊一名石决小金荔支野菊一丈黄一名沿籬菊茉莉金甌玉盤毛心釵頭金侍御蠟梅一名道衣黄尖葉白小堆金白玉錢檀香黄小金佛頭疊金大金佛羅右四十一種其中亦闕九華栽植初種仲春土膏流動菊苗怒生纔及五六寸掘起揀根莖大者相去四寸許種之先用麻餅末一大撮拌土澆灌一月凡三度鉏薙至日暮以溺澆之春月則用蠶沙一法先以溺漬草屨置土下極有力摘腦纔髙一尺以上便與摘腦摘腦則杈生而花闊至立秋而止唯夏佛羅銀毬菊不用摘事實嶺南異物志云南方多温臈月桃李花盡坼他物皆先時而榮唯菊花十一月開葢此物須寒乃發寒晚故發亦遲巴東縣將軍灘對岸山水平秀有黄花上下沱一望約五六里東坡帖曰夏小正以物為節如王𤓰苦菜之類驗之略不差而菊有黄花尤不失毫釐近時都下菊品至多皆智者以他草接成不復與時節相應始八月盡十月菊不絶於市亦可怪也黄魯直跋之曰此何異虹藏不見而虹掛空雷乃收聲而雷發地耶菊賦張南軒敬夫喻子有園一畮畦菊百本日遊其間乃為之賦其辭曰西風兮東籬金英兮紫枝著嘉名兮既逺豈衆卉兮等夷標黄華兮月令寓落英兮楚辭生髙崗兮燭隰原吟鮑照兮賦潘尼互松兮偕杞徑淵明兮宅天隨秋日兮淒淒秋露兮離離萬木槁兮既下一鴈鳴兮初飛送孟嘉兮帽落逆王𢎞兮白衣其操兮箕山之潔其韻兮竹林之絶瀏兮禦寇之御風慄兮馬曹之泛雪臨清流兮子陵之居瀨含夕霏兮真長之望月孤叢兮特秀幽香兮微透紫蝶兮黄蜂凛既寒兮猶湊聘芙蓉以為妃兮命秋蘭以為友官槐斂迹以宵逝兮巖桂容沮而色黝揖江梅以先發兮曰子之茂兮其庸可後邀黄葵以旅處兮曰珠玉其在側予豈不知予之陋一束既多兮魏帝之賜少者百年兮甘谷之壽枝葉老硬兮飽余腹於五月葩華丰好兮悦余目於重九嵗植百本日繞百匝兮聊臨風而三嗅杜甫詩以甘菊名石决秋雨歎詩曰雨中百草秋爛死堦下决明顏色鮮著葉滿枝翠羽葢開花無數黄金錢説者以為即本草决明子此物乃七月作花形如白扁豆葉極稀疎焉得有翠羽葢與黄金錢也彼葢不知甘菊一名石决為其明目去翳與石决明同功故吳越間呼為石决子美所歎正此花耳而杜趙二公妄引本草以為决明子疎矣哉百菊集譜卷五
