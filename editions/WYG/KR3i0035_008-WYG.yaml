body:
  text: 百菊集譜補遺晩香堂品類此除諸譜重複之名淵明菊大夫菊處士菊三顧菊黄金盞菊簇金菊金箭頭菊金骨朶菊黄金帶菊銀錢菊玉盤珠菊玉瓏璁菊伴梅菊茶菊松子菊金陵菊江隂菊江隂白菊獻嵗菊四季菊中秋菊鳳頭黄菊閙蛾兒菊墨菊其中亦闕九華之名欽定四庫全書百菊集譜補遺宋史鑄撰黄華傳廣信邢良孠黄華字季香世家雍州隠于山澤間生男曰周盈曰延年女曰節女皆為神農氏之學嵗乆苗裔散處天下有黄氏白氏金錢氏金樓氏凡七十餘族而黄氏最顯華少時取青晚節取紫初為内黄令九域志北京大名府有内黄縣嘗開卷讀易至黄中通理粲然笑曰美在其中暢於四支矣至榮滿而歸南遊楚屈大夫方與江籬杜蘅及公子蘭作離騷之辭得華喜同臭味把玩不斁楚人歌之曰有美屈平兮洵潔且清兮咀華之英兮挹我謂我馨兮吕不韋著春秋聞華名氏援筆特書然華靜介自立不能媚俗好至魏文帝時嘗徵華入見神采英發帝喜語鍾繇曰黄華函乾坤之淳和體芬芳之淑氣宜侍宴金華殿人亦未甚愛也晉陶淵明曠達有髙尚之氣然且見華俯加採納曰吾不肯折腰對督郵今為吾子折腰與語有味黄菊味甘華曰吾甘心從先生遊餘子苦口白菊味苦何足置齒牙間哉淵明迺翦茅開徑延置家園觴詠陶寫必訪華東籬下握手至熏夕淵明醉眠遣客罷休罷部買切華獨露坐不去瓶罄樽空相對悠然江州刺史王𢎞聞淵明有佳客亟遣白衣致餽淵明貯酒滿船船謂酒􅘑命華拍浮其中以為樂淵明有友徂徠十八公與華齊名蒼髯長身嘗從大夫之後下膏澤有醖藉膏謂松脂可以釀酒能製中山醇醪酒經曰醪汁滓濁酒也東坡松醪賦云製中山之松醪愚按中山在西京以北定州之地東坡帥定武賦嘗飲此酒作華譏其非聖人之清十八公曰我自用我家法卿自用卿家法二句出世説子嵩云或問其所以同華曰陶先生自拔於流俗十八公不彫於嵗寒華雖當青女降霜亦不變色淮南子秋三月青女乃出以降霜雪髙誘注青女天神青妖玉女主霜雪妖乙驕切愚覽漁隱叢話與髙續古緯略並引作青腰玉女是則同時人目為三傑華既經淵明稱賞名聲表表毎遇良辰賔朋登髙開宴華至天資中正非梔貌蠟言梔貎蠟言出柳文鞭價説黄衣黄裳意象閒雅清風徐來徳馨襲人至其晚節不與草木俱腐羣英掃地華獨固蒂巋存曰予自上世以來曉輕身明目之術書名方冊世以為仙且其所居有潭水飲之能制頽齡於華可知矣子孫枝分傲睨冰霜挺有風烈與黄橙陸吉同時東坡有黄甘陸吉傳以為一年好處人到于今稱之贊曰有熉黄華淵乎似道朱紫競時惟華獨也正羣英牢落惟華獨也在莊子徳充符受命於天唯舜獨也正受命於地唯松栢獨也在又遇騷人達士著語品題名譽始益光大雖今古常見而風采常新揚子雲曰無仲尼則西山之餓夫與東國之絀臣惡乎聞非躗言也左哀二十四年是躗言也户快切謂過謬之言夫遇與不遇人物之顯晦繫焉予於黄華亦有感於斯云蘜先生傳建陽馬揖先生名蘜字華其先為甘氏祖曰節華佐神農著本草書成帝用嘉之乃命竹史差次其功封以沃土位在上品之上既而歸隠于南陽潭之山谷世濟其美人多壽考黄帝嗣興有土徳之瑞色尚黄數用九帝曰爾世有大功于民就錫汝以南陽之土賜姓黄氏世世相承以九月九受封之日為先生壽名曰嘉節先生明徳惟馨操履貞介恥與庶類競逐繁華雅志清髙務堅晩節雖青女横陳而正色不變王公貴人慕其風味爭相迎致然氣類不相合則雖强留納交而先生終不屑意惟田園守拙之士巖谷隠逸之人事之惟謹即與傾葢定盟盃酒不相舍先生雖潛徳不耀然吕令之正四時成周王后服飾之用先生與有力焉所知已者楚有靈均晉有淵明本朝有韓稚圭皆與結好為平生歡近時番禺崔公寧辭相印不拜自號菊坡而甘心相與徜徉於其所其見貴重於世如此若昔陶隠居陸天隨諸子升堂矣而未入於室也每嵗九日上自宫掖下至閭巷各稱豐儉為先生壽白衣送酒漢宫開釀太官賜餻或獻茱囊或薦蓬餌或烹桑苧之茶皆為先生之侣也且貴為天子如唐徳宗亦作為歌詩以慶之至於醉卧籬東反籬西此又各隨所寓而稱壽者也其本支百世子孫千億散而之四方者不知其幾若夫族類大略則有范成大諸家之譜在兹不復録太史公曰先生肇分茅土皆倣其方之色蘜自啓國南陽之後居湘灕彭澤者二千祀不易黄姓自餘散處四方者考其氏而知其方若白氏紅氏則著於西南或言朔庭有墨子墨者又衆色之後此近世方有然未嘗與中國盟㑹故名不顯其在青社者有蒼藍二氏生亦不蕃要之南陽實在中土而黄氏又居方之正得數之中其後宜莫與京白受采土生金又當金天御宇之時宜白之盛亞於黄彼朱者子信美矣而有富貴濃艷之態不類山林有道者氣象君子尚論盍謹考哉雜識胡少瀹菊譜序云嘗試述其七美一壽考二芳香三黄中四後彫五入藥六可釀七以為枕明目而益腦功用甚博神農所以載之上經姬公所以列之爾雅屈大夫所以飡其英而著之離騷吕不韋所以覩其華而編之月令黄鵠下太液武帝形之歌九月九日漢風俗以為酒自後胡廣袁隗諸人則取其水以為飲食仙人王子喬與陶洪景輩至啖其根葉考其源流葢自上古已知貴重今人但言陶淵明所好殆不得專其美也云云按西京雜記武帝歌曰黄鵠飛兮下建章金為衣兮菊為裳胡少瀹菊譜後序云子胡子既作菊譜客曰菊之品不一而足然則花之似菊者吾子亦有取乎曰夫疑似之間毫釐之際君子明辨而不恕正以其似是而非有以害道若陽虎之貌似夫子項羽之瞳子如舜其可以形似而遽信之今菊之為物挹之馨香餌之延齡標致髙爽如此自餘小草僅可為臣僕奴𨽻詎敢望其音影花雖相近乃菊之盜猶小人之效君子非不縁飾其外而胷中之不善詎能自揜余懼夫人他日之耳目或為所惑故以其黨類列之編末桐蒿花滴滴金地丁花千里光馬蘭花旋復今觀草堂詩餘其中鷓鴣天桃花菊詞有云解將天上千年艷翻作人間九日黄愚謂此二句用字皆未深稳又檢康伯可詞乃作換得人間九日黄且換得二字用之亦未切當及覈張狀元長短句方知是偷將天上千年艷染却人間九日黄至此意義明白乃知下字之工妙劉䝉譜菊有順聖淺紫之名愚按皇朝嘉祐中有油紫英宗朝有黑紫神宗朝色加鮮赤目為順聖紫葢色得其正矣詳見麈史辨疑按本草與千金方皆言菊花有子愚初以此為疑今觀魏鍾㑹菊華賦其中有芳實離離之言必可取信續又見近時馬伯升菊譜有該金箭頭菊其花長而末鋭枝葉可茹最愈頭風世謂之風藥菊無苗冬收實而春種之據此二説則知菊之為花果有結子者明矣菊花多真假相半難以分别其真菊花蔕子黑而纎若野菊則蔕子有白茸而大味極苦博聞新録夏菊越人名為滴滴金愚觀胡氏譜乃以此品為菊之盜葢因此種枝葉與諸菊不類又至於手撚嗅之絶無其香故胡譜遺之不取愚今之為譜輒反取之者何乃是徇俗泛愛其名耳信此似是而非者也詩賦菊華賦魏鍾㑹何秋菊之可竒兮獨華茂乎凝霜挺葳蕤於蒼春兮表壯觀乎金商延蔓蓊鬱縁坡被崗縹榦緑葉青柯紅芒芳實離離暉藻煌煌微風扇動照耀垂光於是季秋九月九日數并置酒華堂髙㑹娱情百卉凋瘁芳菊始榮紛葩韡曄或黄或赤圓華髙懸準天極也純黄不雜后土色也早植晚發君子徳也冒霜吐頴象勁直也杯中體輕神仙食也乃有毛嬙西施荆姬秦嬴妍姿妖艷一顧傾城擢纎纎之素手雪皓腕而露形仰撫雲髻俯弄芳英愚齋云今諦玩此賦乃知兹菊非尋常之品必是異於衆者葢其中有云延蔓蓊鬱縁坡被崗則知此菊之有藤也又云芳實離離暉藻煌煌則知此菊之結子也又云圓華髙懸準天極也則知其榦之髙决非低小之叢此品必是世謂一丈黄者也寒蜂採菊蘂詩耿湋唐人遊颺下晴空尋芳到菊叢帶聲來蘂上連影在香中去住霑餘霧髙低順過風終慙異蝴蝶不與夢魂通和洪教菊古風林少頴陶令遺世情尚餘愛菊念菊亦有可愛愛之苦不厭我觀傲霜枝真金赴烈焰道韻輕園綺孤標敵鍼奄配以靖節名萬古不為忝况兹中央色獨許此君占凝然端正姿不受紅紫艷草木吾味同世情那得染璀璨歸來辭斯言了無玷全文於此有四韻今節之偶亦愛此花秋來朝暮饜富貴兩浮雲天地一旅店是中論饑飽本自無贏欠便擬學淵明奈此才不贍菊資三徑荒酒須十分灧待讀悠然句乃無雍徹僭但論廣文詩瘧愈不須砭菊花劉子翬芳叢馥郁早抽芽金蘂斕斑晩著花檻小移時爭蓊鬱地寒開意少榮華輕烟細雨重陽節曲徑疎籬五柳家比得春蘭休競秀且供幽客泛流霞晩香堂題詠馬揖伯升愛菊愛菊吟詩興不窮平生事業在其中成名縱未為詩將立傳猶堪號菊翁對菊淵明長醉屈平醒採菊飡英得趣深野老對花醒復醉不同時世却同心賞菊花品甚富四時相繼時時載酒過籬邊無日無花到眼前清賞不須論九日一年長是菊花天友菊雨餘深院香猶在霜後疎籬色倍明臭味相投吾與汝不隨時世變枯榮茹菊雨餘采擷供晨饌亂簇冰盤翠欲流勝友過從休失笑山居只此當珍羞淵明菊單葉白花一名晉菊花之豐腴倍於他菊一榦一花潔白鮮明一叢瀟洒向寒榮曽結柴桑社裏盟貞白魁竒無附麗固應千載擅芳名愚齋云一説淵明菊乃黄色而細者大夫菊細葉黄花花可入藥苗亦可茹即今之甘菊也此花獨抱清髙趣人爵安能浼得渠喚作大夫君識否餐英想自楚三閭處士菊多葉白花豐潔而閒淡世謂之處士白又有所謂處士黄者花小而繁皎皎貞芳雅淡容濂溪推許一何公名標隠逸非無意為有翛然林下風濂溪先生周茂叔愛蓮説云菊為花之隠逸者也伴梅菊多葉白花花獨殿於衆菊雪蘂霜枝本異花同時一一殿年華誰移五柳先生宅來傍孤山處士家金錢菊多葉黄花大如折二錢一徑黄花伴隠居圓如鵝眼大如榆山翁潤屋惟資汝張武還知有此無黄金盞菊千葉黄花大如折二錢細葉相比頗類笑靨兒但中陷而外突耳九日黄花有意開也應知道白衣來先生必向花前醉故遣花神為捧盃小金鈴菊葉類茶菊叢低枝宻金色圓花大如筯頭纍纍相比聚於葉端時當少皥嚴申令故遣金鈴報晚秋寂寂千林正搖落似將木鐸振衰周萬鈴菊花類佛頭黄而豐腴叢髙大而扶疎色鮮明而光采金風鑄出晩秋英造化鑪中巧賦形飛鳥欲來還又去似疑有許䕶花鈴玉盤珠菊多葉白花中數小葉合而為心如珠之圓宛若盤心之承珠也月斧修成玉一團籬邊清潤逼人寒花心擁出驪龍寳一顆盈盈欲走盤茶菊黄色細花花心有芒本草云菊一種紫莖氣香而味甘美葉可羮者為真菊即此是也靈種初非來北苑仙根却自出南陽且同陸羽烹春雪未許淵明把酒觴閙蛾兒菊細葉淡黄花一花不過三四葉葉各相向如蝶拍之狀聚於枝梢栩栩然若將飛舞也花神巧剪閙蛾兒春去飄零無處歸尚有寒枝香信在故應撲撲滿園飛墨菊出於朔庭近世方有獨抱緇衣對曉寒天然清淡惡華丹多因元亮題詩筆洒在寒枝濕未乾對菊有感矍鑠山翁志未衰生平惟菊供襟期清標慣與霜為敵貞節不求春見知把酒相忘陶栗里採苕同調陸天隨浮榮過眼真堪笑秋晩論交更有誰白菊寒香獨立向吾廬風采精神與衆殊細琢水晶成格範巧裁雲母作肌膚霜凝葉瓣疑何厚露滴花心認却無縱使雜居流品内知君浩浩不能汙紫菊紫府羣仙衣紫霞却嗔素節不繁華移將西掖三秋色散作東籬九日花荷槖旁觀難入社茱囊相與是通家靚莊麗服還同調莫向西風立等差鑄淳祐壬寅之夏嘗序菊譜刋梓以便夫觀覽越數年忽得晩香堂百詠開卷伏讀則知馬君先輩酷愛此花無日而不以為樂亦嘗作譜於淳祐壬寅之秋愚味其詩立意清新造語騷雅體題明白世所未有也第愧鑄耄拙非才不足追攀英躅又不識隱君燕逸何方與吾鄉限隔江山幾許里而獲聞賢士君子志同道合如此登堂拜面其願莫遂實勞我心今姑摭二十篇附于右將以益衍其傳云續集句詩史鑄二十首種菊春初種菊助盤蔬蘇子由益氣輕身載舊劉摯舊圖謂本草也終藉九秋扶正色鄭剛中芳時偷得醉工夫白居易菊花五首不受陽和一㸃恩李山甫不嫌青女到孤根盧彥徳見盛山集年年嵗嵗花相似劉庭芝見詩話總龜誰為陶潛買酒樽陳元老見城山詩集二粲粲秋香雨露葩趙宋英天教晩發賽諸花劉禹錫輕烟細雨重陽節劉子翬且盡芳樽戀物華杜甫三漸覺西風換物華朱弁見宋百家詩續選秋叢遶舍似陶家元微之世人若覔長生藥古道情詩下句只這灰心是大還百草枯時始見花歐陽永叔四代謝相因寒事催趙宋英繞籬疎菊又花開許渾霜晴日淡虚庭裏葛吏部見歸愚集多少清香透入來陸龜䝉菊五不是餐英泥楚騷吳莘見寒緑詩集重陽菊蘂泛香醪宋白尋常不醉此時醉邵堯夫陶令抛官意獨髙葉夢得黄菊九首百卉千花了不存陸務觀獨開黄菊伴金樽陶弼欲知却老延齡藥歐陽永叔誰信幽香是返魂東坡二菊是去年依舊黄南唐後主李煜上句鬢從今日添新白風從花裏過來香闕邊上句水向石流出冷云杯中要作茱萸伴葛吏部乃丞相邲之父更領詩人入醉鄉胡曽三白酒新熟山中歸李白風雅韻作新熟碑本作初熟黄花漠漠弄秋暉王荆公東籬採菊隠君子王十朋醉覺人間萬事非失記名上句霜柑糟蟹新醅熟四汪彥章菊詩葳蕤羽葆雜金規羽葆層層間彩金姜特立醉來不厭遶叢吟賈島滿頭且應良辰挿韓忠獻公不挿滿頭辜此心王荆公五籬外黄花菊對誰嚴武附杜甫詩集應知彭澤乆思歸王禹偁有花堪折直須折李錡見杜牧樊川集杜秋娘詩註新酒初篘蟹正肥趙端行見髙疎寮跋西里詩稿六第三句亦可作今朝有酒何妨醉但不知何人所作無限黄花簇短籬蘇子由幽香深謝好風吹寇平仲勸君終日酩酊醉李賀莫待無花空折枝李錡七花裏風神菊擅名陸務觀贈菊見荼庵集緑枝黄蘂有髙情張嵲字巨山詩人不悔衣霑露范希文步入芳叢脚自輕王之道見相山居士集八幸無風雨近重陽僧法顯見游丞相諱佀序適庵詩集折取蕭蕭滿把黄崔徳符酒面浮英愛芬馥梅聖俞銀觥須引十分强李清臣九不與羣芳競魏野宜乎殿顥商邵堯夫露從今夜白杜甫菊是去年黄南唐李後主九日陶公酒陳襄字述古一生青女霜羅隠有同髙士操王之道字彥猷得爾慰淒涼翁龜翁白菊玉攅碎葉塵難染江袤露濕香心粉自勻朱喬年見戛玉集一夜小園開似雪朱貞白清香自是藥中珍許景衡野菊二首熠熠溪邊野菊黄東坡風前花氣觸人香邵堯夫可憐此地無車馬韓退之掃地為渠持一觴陸放翁二野花無主為誰芳陸務觀酒熟漁家擘蟹黄山谷詩句遇酒逢花須一笑山谷詞句故留秋意作重陽陳後山晚菊節過霜風衮衮來許景衡菊花寂寞晚仍開劉滄誰云既晚何用好王十朋為我殷勤送一杯白樂天殘菊天地方收肅殺功陸務觀拒霜花菊枝傾倒不成叢陸務觀九月晦日碎金狼藉不堪摘陸務觀殘菊圖得人知色是空僧詠槿花上句朝開暮落縁何事云引用唐宋名賢詩句其名已具入前編者今不再具唐九名許渾李後主胡曽賈島嚴武李錡李賀韓退之劉滄皇宋二十一名劉摯盧彥徳劉庭芝陳元老劉子翬朱弁葛吏部吳莘宋白葉夢得陶弼趙端行張嵲王之道僧法顯崔徳符李清臣陳襄翁龜翁朱喬年朱貞白詞瑞鷓鴣按前人所作有以平聲字起或有以仄聲字起二者皆通詠桃花菊史鑄底事秋英色厭黄喜行春令借紅粧謝天分付千年品特地攙先九日香此花八月半開愚先以千年對三徑縁三字是平聲不叶宫調故改作九日但犯前賢已用之對陶令駭觀須把酒崔生瞥見誤成章蜂情蝶思兼迷了採蘂還如媚景忙正誤省郎史正志省當作侍曽為建康留守集句詩宋邦永宋當作朱跋纈眼本作老眼胡融譜夏佛羅秋佛羅大金佛羅此三品即佛頂菊也其羅字當作螺葢佛頂乃天生肉髻捲螺髮其菊心頗類之塔子菊髙蟠層級巧堪誇巧堪誇可改作聳簷牙大笑菊不費千金亦可誇可改作百媚千金不足誇亦可作誰把千金競好奢饅頭菊前編可改云離火供炊餅餅圓幽人餐飽向籬邊摘歸閒與癡兒説也使心懽口墮涎石菊花瓣五出或有名為千葉者其實十餘瓣也有深紅粉縁者此品花瓣上下各一色向上一邊深紅色向下一邊白色其上面粉縁乃接下色也百菊集譜補遺
