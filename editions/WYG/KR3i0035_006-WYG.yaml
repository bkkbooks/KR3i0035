body:
  text: 百菊集譜卷六宋史鑄撰體題新詠六十一首以後附入諸士友十九首凡二者之内除於題下該臆吟者八首其他諸篇皆是詠越中所有之品勝金黄籬下秋深花正敷煌煌金彩照吾廬維揚貢品雖稱貴顏色看來反不如御愛黄貴品傳來自禁中色鮮如柘恍迷蜂作歌亦見鍾情重承眷應曾遇徳宗御袍黄秋晚司花逞巧工解將柘色染幽叢待看開向丹墀畔蕭頴士菊榮篇照曜丹墀宛與君王服飾同杜甫花卿歌綿州副使著柘黄注僭乘輿服色也九日黄露叢花發例皆遲異品敷金不詭隨應節及時真可愛登髙且把泛瑤巵又應時寒蘂拆秋含晃耀良金色可參似遇道人殷七七故開佳節日三三金錢菊隂陽鑄出遶籬邊露洗風磨色燦然未解濟貧行世上且圖買笑向樽前又此作明用題字天女將圖買斷秋筭來白帝價難酬金錢滿閤翻嫌富撒向幽叢竟不收金絲菊明題染如艷切人徒染如琰切金絲色侍女謾歌金縷衣爭似黄花得天巧織成紋綹力九切不須機金鈴菊化工寫出爛盈枝顆顆光明耀竹籬賞翫佳人應笑道待教繫向雪獅兒金連菊臆吟迥出嬌紅媚一川風刀細鏤耀籬邊不妨捧向孩兒手留取清香在佛前側金盞圓模羅列占東籬西帝賜來宫様竒疑是花神清酌罷儘教放處不妨欹金盞銀臺黄白天成酒器新曉承清露味何醇恰如欲勸陶公飲西皥應須作主人又作擬將享宴司花女須報韋公舊主人滴滴金夏菊也未見秋來花便開人言因露作根荄千團萬㸃枝頭墜盡化黄金出土來宻友菊按洛陽花木記用此宻友字寒英雅稱伴吾徒色正香清態有餘日涉中園長與㑹何憂因數反成疏楊巽齋宻友花有朶朶相迎意更親之句愚今所作葢取此義又蜜卣菊據髙疎寮用此蜜卣字化工也學割蜂房秋卉粧成春蘂黄芬馥猶疑盛秬鬯未容輕把泛霞觴書洛誥秬鬯二卣正義曰秬黒黍也以此為酒煮鬱金草築而和之使芬香調暢謂之秬鬯酒卣中樽也橙菊上林佳果乆流聲西京雜記云上林苑橙十株秋徑香苞特假名正賴蟹肥新酒熟幽人來賞兩含情荔枝菊莫論枝上粟團黄且喜籬邊珍顆香若使唐家妃子見料應誤摘醉中嘗茱萸菊品出陶家花品外名存吳地藥名中若將泛入重陽酒不用分香摘兩叢艾菊明用題字一入陶籬如楚俗重陽重午兩關情惜哉刪後詩三百菊奈無名艾有名一換押鄉字韻云怪底陶籬似楚鄉寒花暑葉共枝芳無求往古三年効且挹明朝九日香末利菊明用題字來從西域馨香異蓮經有末利花香之言翻作東籬品目新悟此肯為微利役殷勤來賞屬幽人王梅溪求末利花詩老來恥逐蠅頭利故向禪房覔此花今之鄙句葢祖此義甘菊南陽佳種傳來乆濟用須知味若飴苗可代茶香自别花堪入藥效尤竒塔子菊以金鈴菊蟠結而成金彩煌煌般若花髙蟠層級巧堪誇更添佛頂週遭種成此良縁勝聚沙聚沙為佛塔見蓮經偈言毬子菊團秋卉出籬東惹露凌霜衮衮中疑是花神抛未過更教輾轉向西風野菊寒郊露蘂疎仍小一年野菊甚盛乃改作繁何小瘦地霜枝細且長境僻人稀誰與採馬蹄贏得踐餘香黄白菊二色秋英併一根金宜為友玉為昆相依笑向西風裏皓色須還中色尊十様菊臆吟霜蘂多般同一本天教成數殿秋榮從他蛺蝶偷香慣偷遍無過一例清九華菊吳有趙廣信嘗鍊九華丹此菊以丹為名猶酴醾花以酒名之其意各有所寓杜光庭詩初開九鼎丹華熟功成丹鼎花堪比花到重陽色正鮮靖節集中名甚著羨他慣服制頹年又流芳千古傲霜英剪玉絲金照眼明若論駐顏功不小仙丹端可與齊名佛頂菊籬畔光明縁底盛秋來千百化身多露棲不必醍醐灌仁宗皇帝御贊蓮經灌頂醍醐滴滴涼醍醐酥之精液也雨沐何煩手掌摩楞嚴經世尊憐愍阿難以手摩其頂大笑菊丁晉公詩花能含笑笑何人東坡詩花非識面常含笑今愚鄙句亦祖此義玉顏已破晚秋葩不費千金亦可誇幽徑主人偏愛惜且贏耳畔弗諠譁又明用題字晚節敷華性異常黄冠白羽道家粧料應識破榮枯事獨對秋風笑一場又明用題字桃笑春風菊笑秋冶容正色不相侔寒梅一笑如堪索這笑方為是匹儔玉甌菊化工施巧在秋葩琢就圓模瑩可嘉著底香心真蠟色似留賞客欲分茶銀盤菊秋英疑是白金裁承露如從仙掌來翻笑漢皇銅制古斬新一様也竒哉輪盤菊秋深籬下拆霜英圓質風吹颺不停天巧固非煩扁斵日新又豈待湯銘粉團菊月姊容顏别一家天真何必御鉛華秋來殘膩方抛棄幻作籬邊馥馥花彭齊霜月詩應是姮娥剩粧粉一時抛撒下天來此借其意月下白素質鮮明絶㸃塵冰輪髙照轉精神叢叢皓彩如羅綺謂彩帛之紋亦有粟地菊之類箇様誠堪示染人纒枝白西風頓拆晚秋葩色映霜華與月華不特翠枝柔猗於可切儺乃可切更饒緑葉宻交加酴醾菊宋景文公酴醾詩來自蠶叢國香傳弱水神按古蠶叢國即蜀中也春架秋籬景一同想因分種自蠶叢但將酩酊酬佳節不管花居酒品中木香菊秋花也與藥名同素彩鮮明曉徑中多少清芬通鼻觀何殊滿架拆東風寒菊不畏霜風質自殊不招蜂蝶艷何孤梅花松竹如相見朱希真十月菊詞須添羅幕䕶風霜要留與疎梅相見便合添為四友呼淮南菊割脂簇蠟宻成團傑出東籬最奈寒加紫翻宜霜後看料應慣見屬劉安徘徊菊花神著意駐秋光不許寒葩陡頓芳敷彩盤桓如有待幽人把玩不須忙饅頭菊離火供炊餅餅圓陸放翁菊詩有餅餅香字前輩菊詩籬邊餅餅金幽人飽翫向籬邊採來還問堪餐否應使癡兒口墮涏桃花菊仙源分𣲖到籬東灼灼穠華綴露叢崔䕶詩章陶令酒兩家混作一家風燕脂菊臆吟天女染花情若狂鮮妍直欲媚秋光忍將陶徑黄金色也學秦宫朱臉粧牡丹菊臆吟本是秋香九日黄假為國色百花王待殘擬把酥煎啗見漁隠叢話後集二十三卷孟蜀時李昊事莫採芳英泛酒觴紅薇菊臆吟天厭花黄色改殷烏閑切赤色也東籬景物似東山逗遛春蘂為秋蘂荆棘了無藏葉間繡菊寒葩縷縷結緗紅不待纎針見巧工秋老從他宫線減彩文翻喜入花叢石菊花美雖堪寫團扇艷妖未必入東籬紀名何取它山物徧問園官總不知愚辨石菊大菊雖今古之名不同其實一種物也至秋結實名曰蘧麥今窮見麥粒之形了無所惑矣討論既定竊意其石字當為碩案字書碩大也庶幾意合於古書今復成一絶以紀其實云又榦弱葉纎花特竒艷濃九夏到秋時枝頭結實元為藥爭奈越中人罕知若蘧麥所出之地其榦直而堅大菊明用題字也即今之石菊菊名何大為誰開子結秋叢是藥材若所產之地者結子乃至作穗若用催生功不小請嘗便可見嬰孩千金方治產經數日不出或子死腹中以瞿麥煮濃汁服之孩兒菊地母提來風露徑笑風泣露並堪憐品微元乏香肌骨濫預秋英得浪傳春菊蒿菜花是也莫論園蔬品目卑花開不減菊幽竒燦然金色仍堪採春老恰如秋老時紫菊馬蘭花是也秋野閒花是繡鋪佳名得自北人呼見本草若教尼父當時見應惡紛紛色亂朱觀音菊天竺花是也霞幢森列引薰風髙出疎籬紫滿叢翠葉纎纎如細柳直宜挿向淨瓶中繡線菊厭草花是也天成素縷結秋深巧刺由來不犯針籬下工夫何絢爛條條綰綴紫花心佳友昔曽端伯以菊為佳友愚今以詩實其名氣清色正品尤髙好事幽人善與交開徑何須望三益相陪雅尚在香苞壽客近世張敏叔以菊為壽客愚今以詩實其名東籬冷落舊家鄉性耐風霜氣味長幾度入來重九宴主人傳得引年方對菊懐古靖節先生菊滿園其名獨有九華存東籬若許塵蹤到佳品須當盡討論菊花單題獨芳三徑屬秋深清致貞姿快賞心解道卓為霜下傑平生靖節最知音金絲菊馮發藻十首闕一纒風綰雨短籬旁織出黄花縷縷黄遙想司花幾仙子鮮明擬作六銖裳茱萸菊一種秋英具兩般摘來浮向酒盃寛阿誰到得重陽日醉把花枝子細看夏月佛頭菊圓英現出端嚴相素瓣染成知見香必竟白毫破炎毒故教開向夏畦凉酴醾菊秋花也與酒齊名三月留為九月英朶朶露栖明亞雪還如壓架拆春晴朝天菊臆吟凌霄花豈凌霄去向日葵空向日傾何似幽姿堪對越也酬洪覆拱髙明桃花菊怪底𤣥都花發遲西真著意在霜枝春葩也耐秋風勁紅雨何愁亂入籬牡丹菊秋香剛欲竊天香遙想南陽似洛陽莫道東籬藹聲價詩人曽擬作花王孩兒菊穉叢弱質巧相如曉沁啼痕一雨餘天亦何心鍾愛汝也呈佳色殢陶廬采菊用古人名賦和霜旋采黄香嗅與客登髙適興時多謝安排滿頭挿相隨何得怨開遲金鈴菊孫耕三首疑是良工巧鑄成天然顆顆帶黄英籬邊一任風搖動不學簷前斷續聲孩兒菊弱質生成由地母清姿保愛藉園公花偏嬌嫩葉偏細凝竚籬邊弄晩風鷺鷥菊臆吟有此品嚴州之玉羽毿毿剪作花花心挺出傲霜華恰如未上青天去且立西風古徑斜楊妃菊臆吟陸希澄含笑向籬旁花叢似洞房露濃新出浴霜薄淺成粧尚帶霓裳色猶存輦路香張全真題明皇太真聨鑣圖詩並轡春風輦路香故令千載下還許侑瑤觴金盞銀臺許光曽黄中素表拆秋葩恰似開筵富貴家晃耀西風深院裏清標不減水仙花佛頭菊僧希髙二首佳卉超凡沐雨開恍如螺髻出山來世尊肉髻見蓮經與楞嚴經就叢更種金蓮菊闕大笑菊寒花也解媚清秋貌似呵呵滿檻稠若使幽王能著眼何須舉火戲諸侯金錢菊僧文行二首化工鑄出最光圓閒數枝頭不計千滿徑黄花秋富貴陶公何必苦無錢大笑菊遶籬喜色破新愁一粲西風卒未休穀梁傳注粲然盛笑貌非學野花留寳靨應􅅓楚客獨悲秋集句詩史鑄四十首鑄兒童時嘗閲東軒臞儒趙公保集句梅詩喜其多有可取今故效顰采擷百家英華為菊成章也種菊幽懐逺慕陶彭澤王禹偁一畝荒園試為鉏蘇子由自種黄花添野景謝景山見詩話總龜幾多光彩照庭除魏野菊花十二首無艷無妖别有香僧齊已對菊知心誰解賞孤芳陸務觀淵明酩酊知何處王荆公安得斯人共一觴謝無逸二霜裏鮮鮮照眼明王十朋人言此解制頽齡梅聖俞憐香擘破花心齅姚揆酌盡齋中竹葉缾黄山谷三一夜清霜殞物華蔡柟寒芳開晩獨堪嘉丁寳臣折來嗅了依前嗅邵堯夫不是尋常兒女花王十朋四千金方菊花作枕袋大能去頭風明眼目陸清務觀菊詩傍籬小摘供囊枕留得殘香夢亦籬菊含風暗度香余安行栽多不為待重陽齊已愈風明目須真物蘇子由白菊夢寐宜人入枕囊山谷五露叢芬馥敵蘭芽韓忠獻公清賞終存好事家丁寳臣莫遣兒童容易折洪景盧此花開後更無花元微之六露裛幽花冷自香釋皎然藥中功效不尋常王十朋食薑祛風偏重山泉漬文保雍胡廣隨縁却壽長鄭剛中菊七清香裛露對髙齋司空圖端仗兹花慰老懐王十眀欲折一枝來侑酒蔡柟登髙能賦屬吾儕陳後山八八月九月天氣凉李白遶欄種菊一齊芳邵堯夫好風應㑹幽人意江奎時去時來管送香張芸叟九不趂盛時隨衆卉文與可幽姿髙韻獨蕭然田元邈别開小徑連松路王介甫常愛陶潛逺世縁梅聖俞十籬菊開時寒有信王彥霖幽香還釀客懐清周麟之折歸忍負金蕉葉張彦實欲伴騷人賦落英蘇東坡十一菊花有意浮盃酒汪彥章秋老霜濃滿檻開江袤多謝主人相管領沈瀛盡收清致助吟才張子野十二一夜新霜著瓦輕歐陽永叔照窗寒菊近人清聞人善言次韻童恭叔䞉收芳蘂浮巵酒曾端伯白髮年年不負盟聞人善言中秋月黄菊二十首黄花漠漠弄秋暉王荆公竚立階前香在衣王性之正色逢人何太晚强幾聖衰翁相對惜芬菲白樂天二白露黄花自遶籬羊士諤幽香深謝好風吹寇萊公陶公没後無知已李山甫一作羅隠嵗嵗花開知為誰李頎三凡菊詩中言霜露者甚多至於言雨者惟王龜齡嘗稱范文正公有句云半兩黄花秋賞健云遶籬黄菊自開花僧洪覺範開日仍逢小雨斜丁寳臣菊第三首句自得金行真正色丁寳臣菊第二首句肯參紅紫鬭紛華朱希真四金英寂寞為誰開王禹偁底許清香鼻觀來張孝祥籬下先生時得醉白樂天餘風千載出塵埃王荆公五滿園佳菊鬱金黄白樂天重陽席上壽質清癯獨傲霜楊巽齋且喜年年作花主白樂天花前歎依然相伴向秋光羅隠菊六五行正氣產黄花杜光庭不在詩家即酒家錢易詩筆酒盃俱有味元絳亦同元亮舊生涯本朝江為七滿地黄花得意秋良祐闕姓下句浪陪使節赤松遊見於石刻移來庭檻助清幽齊唐自縁禀性天生異張齊賢不與繁華混一流楊時可八籬邊黄菊為誰開李嘉祐轉憶陶潛歸去來髙適挿了滿頭仍漬酒邵堯夫且謀歡洽玉山頽元澶九倚風黄菊遶疎籬彭應求自有清香處處知毛友今日王孫好收采鮑容濁醪霜蟹正堪持蘇子由十金蘂繁開曉更清歐陽修薄霜濃露倍多情劉原父歸田誰是淵明興趙嘏獨遶東籬萬事輕用紫芝十一叢菊疎疎著短籬僧璉不器重陽前後始盈枝文與可托根占得中央色趙宋英見氣候推䝉不比凡花兒女姿姜特立十二自有淵明方有菊辛幼安因人千古得嘉名韓忠獻一年好處君須記蘇東坡翠葉金華刮眼明劉原父十三東籬黄菊為誰香王十朋不學羣葩附艷陽蘇澄庵直待素秋霜色裏廖匡凝自甘深處作孤芳文與可十四香霧霏霏欲噀人蘇東坡黄花又是一番新宋邦永見愚園咏史陶家舊已開三徑韓治直到如今迹未陳楊巽齋十五滿眼黄花慰素貧山谷年年結侣采花頻劉禹錫要收節物歸觴詠張灝只許閒人作主人姜特立十六菊花天氣近新霜陸務觀節近花須滿意黄陳後山陶令籬邊常留宿曽端伯朝來滿把得幽香蘇子由十七東籬九日富黄花曽端伯節物驚心秪自嗟許景衡盡日馨香留我醉王禹偁銀瓶索酒不須賖王十朋十八斜照明明射竹籬僧道潛黄花能與嵗寒期范文正公人疑五柳先生宅周紫芝消得攜觴與賦詩鄭谷十九黄花弄色近重陽僧道潛風拆霜苞細細香江袤似與幽人為醉地陸務觀隨晴隨雨一傳觴陳與義二十可意黄花是處開蘇東坡芝蘭風味合相陪綦崈禮應須學取陶彭澤白樂天左把花枝右把盃司空圖白菊三首我憐貞白重寒芳陸龜䝉小徑低叢淡薄粧蔡柟謝女黄昏吟作雪徐仲車天然别是一般香李端叔二幽芳天與不尋常江袤逆鼻渾疑雪亦香陳後山一作張文潛把酒可能追靖節汪彦章素英一色混瑤觴邵堯夫只此一句取於五言三瓊葩燦彩遶籬東楊巽齋不怯清霜更耐風趙令衿淡泞精神無俗艷江袤獨髙流品蕙蘭中李鼐黄白菊胡侍郎二色蓮詩見醉翁談録金英鑠鑠擅秋芳楊巽齋中有孤叢色奪霜白樂天手把數枝重疊嗅邵堯夫兩般顏色一般香胡侍郎詩紅白蓮花共一塘云野菊一簇疎籬有野花邵堯夫不應青女妬容華洪龜父繁英自剪無人挿李鼐只有黄蜂趂兩衙孫仲益晚菊青蘂重陽不堪摘杜甫重陽已過菊方開邵堯夫不將時節較早晚王十朋且折霜蕤浸玉醅蘇東坡殘菊節去蜂愁蝶不知鄭谷冷香消盡晚風吹謝無逸碎金狼藉不堪摘陸務觀菊空作主人惆悵詩于武陵一作韋莊引用唐宋名賢詩句唐二十二名句以下人名依集次第僧齊已元微之釋皎然司空圖李白白樂天羊士諤李山甫李頎羅隠李嘉祐髙適元澶鮑溶趙嘏廖匡凝劉禹錫鄭谷陸龜䝉杜甫于武陵杜光庭皇宋七十名王禹偁蘇子由謝景山魏野陸務觀王荆公謝無逸王十朋梅聖俞黄山谷蔡柟丁寳臣邵堯夫余安行韓忠獻公洪景盧文保雍鄭剛中陳後山張芸叟文與可田元邈王彥霖周麟之張彥實蘇東坡汪彥章江袤沈瀛張子野歐陽修聞人善言曽端伯王性之强幾聖寇萊公僧洪覺範朱希真張孝祥楊巽齋錢易元絳江為良祐齊唐張齊賢楊時可毛友劉原父周紫芝僧璉不器趙宋英姜特立辛幼安蘇澄庵朱邦永韓治張灝許景衡僧道潛范文正公陳與義綦崈禮徐仲車李端叔趙令衿李鼐胡侍郎洪龜父孫仲益不記何代三名姚揆江奎彭應求愚自丙申迄于甲辰每得菊之一品一目必稽于衆其言同者然後筆而記之今譜内有六品尚闕其説縁愚曩嘗一見今畦丁罕種未獲再覈以取其的故也凡九年間於吾鄉得正品與濫號假名者總四十五種以次諸譜之後予昨當花時每嵗須苦吟體題詩與集句詩一二十篇以揄揚衆品之清致積稔彌乆幾至二百篇今選百篇濫贅卷尾至此興盡而絶筆矣爾後雖間有黄薔薇金萬鈴之類始出此二品首見於虢地品類近時吾鄉亦有之然愚年將耋景則纈眼勌於辨眎未容茍簡増入也如有與我同志者幸為續譜云百菊集譜卷六
