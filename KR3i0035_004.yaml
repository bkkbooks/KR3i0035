body:
  text: 百菊集譜卷四宋史鑄撰歴代文章多非全文屈原離騷經朝飲木蘭之墜露兮夕餐秋菊之落英王逸注云言旦飲香木之墜露吸正陽之津液暮食芳菊之落華吞正隂之精蘂洪興祖補注曰秋花無自落者當讀如我落其實而取其材之落又據一説云詩之訪落以落訓始也意落英之落蓋謂始開之花芳馨可愛若至於衰謝豈復有可餐之味魏鍾㑹菊花賦何秋菊之竒兮獨華茂乎凝霜挺葳蕤於蒼春兮表壯觀乎金商縹榦緑葉青柯紅芒又見史譜序引晉潘尼秋菊賦垂采煒於芙蓉流芳越乎蘭林又曰既延期以永壽又蠲疾而弭痾晉盧湛菊花賦浸三泉而結根晞九陽而擢莖若乃翠葉雲布黄蘂星羅晉傅𤣥菊賦布濩河洛縱横齊秦掇以纎手承以輕巾服之者長壽食之者通神晉嵇含菊花銘曰煌煌丹菊翠蓋紫莖晉成公綏菊花銘數在三九時惟斯生又有菊頌曰先民有作詠兹秋菊緑葉黄花菲菲彧彧芳踰蘭蕙茂過松竹其莖可玩其葩可服晉傅統妻菊花頌英英麗草禀氣靈和春茂翠葉秋曜金華布濩髙原蔓衍陵阿揚芳吐馥載芬載葩爰拾爰採投之醇酒御于王公以介眉壽晉袁崧菊詩靈菊植幽崖擢頴凌寒飈春露不染色秋霜不改條按晉書或作袁山松附陶淵明九日閒居詩并序余閒居愛重九之名秋菊盈園而持醪靡由空服九華寄懐於言愚齋云近年蔡夢弼有注和陶詩其中不注九華為菊名惜其有闕世短意恒多斯人樂久生日月依辰至舉俗愛其名露淒暄風息氣澈天象明往鷰無遺影來鴈有餘聲酒能祛百慮菊為制頹齡如何蓬廬士空視時運傾塵爵恥虚罍寒華徒自榮斂襟獨閒謡緬焉起深情棲遲固多娯淹留豈無成飲酒詩秋菊有佳色裛露掇其英汎此忘憂物逺我遺世情又云採菊東籬下悠然見南山此皆陶詩中句唐宋詩賦選詞并此詩不惟選取精妙者或有菊名見諸文集此特取之以廣識其名或出名公所作雖曰未工此亦取之以見前賢賦詠之大畧覽者當知之文言陸宣公文言曰菊禀隂陽之和氣受天地之淳精又曰不失其時比君子之守節無競於物同志人之不爭又曰行道者象之足以建徳立身者取之足以作程又曰春之交夏之候靡木不榮無草不茂我亦抽英而擢秀商之氣冬之時無木不落無草不萎我亦發花而呈姿又曰淳和自守芳潔自持秋香亭賦為鄭屯田作范文正公鄭公之後兮宜其百祿使于南國兮鏗金粹玉倚大斾於江干揭髙亭於山麓江無煙而練迴山有嵐而屏矗一朝賞心千里在目時也秋風起兮寥寥寒林脱兮蕭蕭有翠皆歇無紅可凋獨有佳菊弗冶弗天采采亭際可以卒嵗畜金行之勁性賦土爰之甘味氣驕松筠香滅蘭蕙露漙溥以見滋霜肅肅而敢避其芳其好胡然不早嵗寒後知殊小人之草黄中通理得君子之道飲者忘醉而餌者忘老云云菊老元㣲之秋叢遶舍似陶家遍遶籬邊日漸斜不是花中偏愛菊此花開盡更無花重陽席上賦白菊白樂天滿園佳菊鬱金黄中有孤叢色借霜還似今朝歌酒席白頭翁入少年場歎庭前甘菊花杜甫簷前甘菊移時晩青蘂重陽不堪摘明日蕭條盡醉醒殘花爛漫開何益籬邊野外多衆芳采擷細瑣升中堂念兹空長大枝葉結根失所纒風霜晩菊韓愈少年飲酒時踊躍見菊花今來不復飲每見恒咨嗟佇立摘滿手行行把歸家此時無與語棄置奈悲何九月十日菊鄭谷節去蜂愁蝶不知曉庭還遶折殘枝自緣今日人心别未必秋香一夜衰白菊皮日休已過重陽半月天琅華千㸃照寒烟蘂香亦似浮金靨花様還如鏤玉錢憶白菊陸龜蒙稚子書傳白菊開西城相滯未容迴月明階下窻紗薄多少清香透入來和令狐相公玩白菊劉禹錫家家菊盡黄梁國獨如霜瑩淨真琪樹分明對玉堂僊人披雪氅素女不紅妝粉蝶來難見麻衣拂更香向風搖羽扇含露滴瓊漿髙艷遮銀井繁枝覆象床桂叢慙並發梅粉妒先芳一入瑶華詠從兹播樂章菊李山甫籬下霜前偶得存苦教遲晚避蘭蓀能消造化幾多力不受陽和一㸃恩生處豈容依玉砌要時還許上金罇陶公没後無知已露濕幽藂見淚痕菊羅隱籬落嵗云暮數枝聊自芳雪裁纎蘂宻金拆小苞香千載白衣酒一生青女霜春叢莫輕薄彼此有行藏華下對菊司空圖清香裛露對髙齋泛酒偏能浣旅懐不似春風逞紅艷鏡前空墜玉人釵對菊齊已無艷無妖别有香栽多不為一作只為待重陽莫嫌醒眼相看過却是真心愛澹黄醒眼一作醉眼商州九月十八日大雪雪後見菊王禹偁狼藉金錢撒野塘幾叢無力卧斜陽爭偷暖律輸桃李獨亞寒枝負雪霜誰惜晚芳同我折自憐孤艷襲人香幽懐逺慕陶彭澤且擷殘英泛一觴和張少卿白菊吟邵堯夫清淡曉凝霜宜乎殿顥商自知能潔白誰念獨芬芳豈為瓊無艷還驚雪有香素英浮玉液一色混瑤觴詠菊魏野二首榮雖同雨露晩不怨乾坤五色中偏貴千花後獨尊馨非慙黍稷採合勝蘋蘩蛺蝶寒猶至䳡鷯靜亦蹲味堪滋玉鉉光欲奪金罇帶露藂尤宻經霜艷更繁砌蛩親有路梁鷰識無門薜荔宜求友茱萸好結婚栽培勞婢僕服食教兒孫易把方先哲難為繼後昆敗莎承亞朶落葉擁纎根雖異皇家瑞寧辜白帝恩延齡仙訣著應候禮經言不與羣芳競還如我避喧白菊濃露繁霜著似無幾多光采照庭除何須更待螢兼雪便好藂邊夜讀書詠菊王荆公四首補落迦山傳得種閻浮檀水染成花光明一室真金色復似毗耶長者家城東寺菊黄花漠漠弄秋暉無數蜜蜂花上飛不忍獨醒辜爾去慇懃為折一枝歸和晩菊不得黄花九日吹空看野葉翠葳蕤淵明酩酊知何處子美蕭條向此時委翳似甘終草莽栽培空欲傍藩籬可憐蜂蝶飄零後始有閒人把一枝殘菊黄昏風雨打園林殘菊飄零滿地金折得一枝還好在可憐公子惜花心甘菊司馬温公野菊細瑣物籬間私自全徒因氣味殊不為庖人捐采升白玉堂薦以黄金盤願若南陽守永扶君子年重九席上觀金鈴菊韓忠獻公二首黄金綴菊鈴兖地獨馳名金鈴菊兖州種細蘂浮杯雅香筩貯露清風休沈夜警雨碎入寒聲自此傳仙種秋芳冠玉京和崔象之紫菊紫菊披香碎曉霞年年霜晚賞竒葩嘉名自合開仙府麗色何妨奪錦砂雨徑蕭疎凌蘚暈露叢芬馥敵蘭芽孤標只取當筵重不似尋常泛酒花次韻南陽錢紫㣲盆中移白菊劉忠肅公摯晚秋風露下星榆玉刻圓錢散曉株人住水涯多白髮地應花谷近清都挼香漬酒登新譜益氣輕身載舊圖移取黄堂朝夕見北洲亭逺故臺蕪郡中舊有白菊臺希真堂東手植菊花十月始開歐陽修當春種花唯恐遲我獨種菊君勿誚春枝滿園爛張錦風雨須臾落顛倒看多易厭情不専鬭紫誇紅隨俗好豁然髙秋天地肅百物衰陵誰暇弔君看金蘂正芬敷曉日浮霜相照耀煌煌正色秀可餐藹藹清香寒愈峭髙人避喧守幽獨淑女靜容羞窈窕方當搖落看轉佳慰我寂寥何以報時攜一樽相就飲如得貧交論久要我從多難壯心衰迹與世人殊靜躁種花不種兒女花老大安能逐年少甘菊蘇東坡越山春始寒霜菊晩愈好朝來出細蘂稍覺芳嵗老孤根䕃長松獨秀無衆草晨光雖照耀秋雨半摧倒先生卧不出黄葉紛可掃無人送酒壺空腸嚼珠寶香風入牙頰楚些發天藻新荑蔚已滿宿根寒不槁揚揚弄芳蝶生死何足道頗訝昌黎公恨爾生不早退之秋懐詩鮮鮮霜中菊既晚何用好揚揚弄芬蝶爾生還不早五月園夫獻紅菊蘇潁濱三首黄花九月傲清霜百草滿園無比香紅紫無端盜名字試尋本草細思量南陽白菊有奇功潭上居人多老翁葉似皤蒿莖似棘未宜放入酒盃中戲題菊花春初種菊助槃蔬秋晩開花挿酒壺㣲物不多分地力終年乃爾任人須天隨匕筯幾時輟彭澤罇罍未遽無更擬食根花落後一依本草太傷渠戲答王觀復酴醿菊黄山谷二首誰將陶令黄金菊幻作酴醿白玉花小草真成有風味東園添我老生涯戲答王子予送凌風菊病來孤負鸕鷀杓禪板蒲團入眼中浪説閒居愛重九黄花應笑白頭翁九月十日菊花爛開張文潛蕭條秋圃風飛葉却有黄花照眼明已過重陽慵采擷自嫌亦作世人情次韻桃花菊朱行中名服紹聖初人籬邊不語自成蹊紅入秋叢見亦稀亂挿烏巾酬老健輕浮白酒惜春歸劉郎一去花何晚陶令重來色已非蝶散蜂藏無足恠冷香寒艷不堪依次韻時從事桃花菊侯季長名延慶政和中人霜郊百草半青黄寒菊偷春作艷粧灼灼似誇籬下客夭夭欲伴禁中郎退之百葉桃花云故伴仙郎宿禁中元都道士聞須種彭澤先生見定狂莫信化工欺世俗且將一笑薦彫觴菊錢昭度曾見春花落萬紅不然隨雨即隨風如何得到重陽日浮在陶家酒盞中次韻十五日菊丁寶臣二首秋香多日閟英華霜脱離離抱砌斜趂節不隨時俗眼近冬真是嵗寒花摛辭舊入騷人筆載酒誰尋醉令家曾讀南華齊物論均無遲速可驚嗟寒芳開晚獨堪嘉開日仍逢小雨斜秋盡亭臺凋木葉月圓時節伴蓂花幽香不入登髙㑹清賞終存好事家黄蘂綠莖如舊嵗人心徒有後時嗟五色菊愚齋云孫真人種花法與洛陽花木記皆有此菊名劉原父二首屢聞白雪題詩句飽見黄花泛酒盃豈似一枝能五色相隨次第雪中開庭前菊花翠葉金華刮眼明薄霜濃露倍多情誰人正苦山中醉借與繁香破宿酲都勝菊江袤三首似嫌春色愛秋光格外風流晚獨芳淡佇精神無俗艷豐醲肌骨有天香玉攅碎葉塵難染金蹙深心蝶謾狂曉帶露華初折贈瑤臺欲識斬新粧御愛菊黄花開盡白花開移自新羅小小裁雅質似嫌施粉黛玉肌端是屑瓊瑰曽㕘御側龍顔愛尚帶天邊月色來輕著曉霜添嫵媚看勻紅淺上香腮五色菊孤根分斸便成叢色弄輕黄轉紫紅愁似斂容羞白日淡如無語怨西風自緣取賞人心别不許陪觀衆志同亂折東籬休借問多情誰是主人翁亞叟惠龍腦菊許景衡正色最宜霜後見清香自是藥中珍明年把酒東籬下采采何如舊主人梅開踰月而黄菊方爛然鄭剛中江梅久矣報塗粉籬菊傲然方鑄金嶺外四時惟一氣難分冬霧與秋隂詠菊汪彥章依倚西風不自持葳蕤羽葆雜金規繁開不負朝陽色獨步非關昊帝私把酒可能追靖節掇苗終欲慕天隨春紅過盡聊經眼頼有芬芳慰所思十日買黄菊二株王十朋三首十月更十日黄花開滿枝鮮鮮如可餐采采還自疑重陽不堪摘况後一月期既晚何用好兹言聞退之天然傲霜性寧問早與遲不以日月斷深杯為花持十月望日買菊一株頗佳秋去菊方好天寒花自香深懐傲霜意那肯媚重陽十月二十日買菊一株置于郡齋松竹之間目為嵗寒三友三百青錢一株菊移置牕前伴松竹鮮鮮正色傲霜性不逐重陽上醽醁誰云既晚何用好端似髙人事幽獨南來何以慰淒涼有此嵗寒三友足分送四月菊與提刑都運二丈張孝祥二首午隂籬落小徘徊底許清香鼻觀來定自霜臺風力峻故教霜菊暑中開金縷裁衣玉綴裳掃除瘴暑作秋香一杯擬做重陽賞更惜西風一夜凉贈菊陸務觀游首二花裏風神菊擅名品流不減晉諸卿梅應相與有𤓰葛蘭復何憂無弟兄移後併逢三日雨開時恰值十分晴傍籬小摘供囊枕留得殘香夢亦清陶淵明云三徑就荒松菊猶存蓋以菊配松也予讀而感之因賦此詩菊花如端人獨立凌冰霜名紀先秦書功標列僊方紛紛零落中見此數枝黄髙情守幽貞大節禀介剛乃知淵明意不為汎酒觴折嗅三歎息嵗晚彌芬芳朝天菊得於婺源菊愚齋云此品想藤之類洪景盧邁但見荼䕷能上架那知甘菊解朝天亭亭秀出風煙上冷落東籬却可憐末利菊洪景伯适化工將末利改作壽潭花零露團佳色鵝黄自一家叢菊石延年風勁香逾逺霜寒色更鮮秋天一作光買不斷無意學金錢菊陶弼九月嚴霜殺草根獨開黄菊伴金罇東籬故事何重疊醉倒花前是逺孫山行見菊李鼐野色芬敷洗露香籬邊不減御衣黄繁英自翦無人挿應笑陶潛兩鬢霜夭桃途次見菊文與可英英寒菊犯清霜來伴山中草木黄不趂盛時隨衆卉自甘深處作孤芳其他爛漫非真色惟此氤氲是正香却念白衣誰送酒滿籬髙興憶吾鄉大笑菊姜特立二首玉瓣金心磊落花天姿髙灑出常葩標名大笑縁何事開口相逢有幾家霜後菊嫩黄釅白媚秋暉正坐清霜一夜飛似怯曉來天氣冷一時都換紫羅衣菊苗彭汝礪狀元重陽黄菊花零落殆無有㣲陽動淵泉嫩葉出枯朽青青好顔色寂寥霜雪後物理如轉環開花豈其久種菊髙文虎菊載神農經不見詩三百周官叙鞠衣一言僅可摘黄華紀吕令落英餐楚客伯始飲得壽桐君書探賾移根候萌動需時當甲拆我羨柴桑里敢希履道宅不種兒女花朱朱與白白閲譜品雖多求栽地恐窄揠苗助其長抱甕滋以澤朗詠黄為正流播風騷格寒香紫茁蘭晚節桐柯柏相繼早梅芳一笑巡簷索愚齋按後漢胡廣字伯始陶按本草相君有採藥録註其花葉形色柴桑乃淵明所居之里在九江潯陽縣道履道坊乃白樂天退老之地在洛陽按履新居詩籬菊黄金合窻筠緑玉稠蠟梅菊次韻周仙尉聞人善言臘前曽弄色秋晚更包黄昔認蜂攅蜜今看蝶戀香輩流雖易處名氏却同鄉㑹見成功女還思九日觴金錢菊楊巽齋清曉幽叢露作團籬邊積疊喜人看落英欲買真無價唯許騷人罄一餐閏月見九華菊翁龜翁逢龍衆草已枯霜墻隂獨自芳旋開三四蘂知為兩重陽酒恰今朝熟花多一月香又經風雨後得爾慰淒涼甘菊冷淘王禹偁經年厭梁肉頗覺道氣渾孟春奉齋戒勑厨唯素飱淮南地甚暖甘菊生籬根長芽觸土膏小葉弄晴暾采采忽盈把洗去朝露痕俸麵新且細溲攝如玉墩隨刀落銀縷煮投寒泉盆雜此青青色芳香敵蘭蓀一舉無孑遺空媿越盌存解衣露其腹稚子為我捫飽慙廣文鄭饑謝魯山元廣文先生飯不足元魯山餓而死况吾草澤士藜藿供朝昏謬因事筆硯名通金馬門官供政事食久直紫微垣誰言謫滁上吾族飽且温既無甘㫖慶焉用品味繁子美重槐葉直欲獻至尊起予有遺韻甫也可與言晩食菊羮司馬温公朝來趨府庭飲啄厭腥羶况臨敲扑喧憤憤成中煩歸來褫冠帶杖履行東園菊畦新雨霽緑秀何其繁平時苦目痾兹味性所便采擷授厨人烹瀹調甘酸毋令薑桂多失彼真味完貯之鄱陽甌薦以白玉盤餔啜有餘味芬馥逾秋蘭神明頓颯爽毛髮皆蕭然迺知愜口腹不必矜肥鮮嘗聞南山陽有菊環清泉居人飲其流孫息皆華顛嗟予素荒浪强為簮纓牽何當葺弊廬脱略區中縁南陽丐嘉種蒔彼數畝田抱甕新灌溉爛漫供晨餐浩然養恬漠庶足延頹年采菊圖王十朋二首淵明恥折腰慨然詠式微閒居愛重九采菊來白衣南山忽在眼倦鳥亦知歸至今東籬花清如首陽薇題徐致政菊坡圖名夀仁南方有髙士仁義偃王裔家山闢幽坡手取香草蓺秋至有黄華采采滿衣袂客來酒盈尊詩出語驚世無心學淵明偶與淵明契靜者年自長頹齡不須制髙懐恥獨樂地逺人罕詣丹青寫佳境有目皆可睨吾家鮮鮮徑荒蕪屢經嵗儒冠誤此身掛之公得計桃花菊詞鷓鴣天張孝祥或云康伯可作一種穠華别様粧留連春色到秋光解將天上千年艷翻作人間九日黄凝曉露傲清霜東籬恰似武陵鄉有時醉眼偷相顧錯認陶潜作阮郎曾端伯慥取友於十花以菊為佳友口號并調笑令五柳門前三徑斜東籬九日富黄花豈惟此菊有佳色上有南山日夕佳佳友金英輳陶令籬邊常宿留秋風一槩摧枯朽獨艷重陽時候賸收芳蘂浮巵酒薦得先生眉壽愚齋云宿留字兩見趙岐注孟子孫奭音義上音秀下音霤按廣韻宿留停待也王龜齡十朋取莊園花卉目為十八香以菊為冷香有詩詞佳節逢吹帽黄金染菊叢淵明何處飲三徑冷香中㸃絳唇霜蘂鮮鮮野人開徑親栽植冷香佳色趂得重陽摘預約比鄰有酒須相覔東籬側為花辭職古有陶彭澤毗陵張敏叔繪十花為一圖目曰十客圖其間菊花曰壽客錢塘關士容因賦詩詩云莫惜朝衣換酒錢淵明邂逅此花仙重陽滿滿杯中泛一縷黄金是一年此詩愚得於士友殊恨其不工今作一絶以易之云東籬寂寞舊家鄉頭白天生鬚又黄按本草白菊仙經以為妙用服餌多用之嵗嵗相陪重九宴主人傳得引年方百菊集譜卷四
