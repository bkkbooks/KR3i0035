body:
  text: 百菊集譜卷二宋史鑄撰諸州及禁苑品類吳人沈競撰譜元本列為六篇愚今乃分入集譜諸門潛山朱新仲有菊坡所種各分品目玉盤盂與金鈴菊其花相次又有春菊花小而微紅者有佛頭菊花不作瓣而為小筒樣者有枇杷菊葉似枇杷花似金盞銀盤而極大却不甚香有丁香菊花小而外紫內白者至今舒州菊多品如蜂兒菊者鵝黃色水晶菊者花面甚大色白而透明又有一種名末利菊者初開花小四瓣如末利既開花大如錢潛江品類甚多有鋪茸菊色緑其花甚大光如茸二月間開今臨安有大笑菊其花白心葉葉如大笑或云即枇杷菊頃在長沙見菊亦多品如黃色曰御愛笑靨孩兒黃滿堂金小千葉丁香壽安真珠白色曰疊羅艾葉毬白餅十月白孩兒白銀盆大而色紫者曰荔枝菊又有五月開者他處有所謂十樣菊者一叢之上開花凡十種如大金錢小金錢金盞銀盤則在在有之如婺女則有銷金北紫菊紫瓣黃沿銷銀黃菊黃瓣白沿有乾紅菊花瓣乾紅四沿黃色即是銷金菊三菊乃佛頭菊種也浙間多有荷菊日開一瓣開足成荷花之形衆菊未開則不開衆菊已謝則不謝又有腦子菊其香如腦子花色黃如小黃菊之類又有茱萸菊麝香菊水仙菊水仙者即金盞銀臺也金陵有松菊枝葉徑細如松其花如碎金層出于密葉之上豫在豫章嘗見之臨安西馬城一作塍園子每嵗至重陽謂之鬭花各出奇異有八十餘種豫不暇悉求其名有為豫於禁中大園子得菊品近六十種多與外間同名者姑次第之御袍黃菊大花頭御衣黃小花頭白佛頭花早黃佛頭花晚黃新羅白新羅戴笑菊即大笑菊橙子菊薔薇菊末利菊樝子菊花小色黃香如樝子大金錢小金錢金盞銀臺金盞金臺明州黃泰州黃黃素馨白素馨黃木香白木香牡丹菊黃酴醿白酴醿大金黃小金黃夏菊花與佛頭一同五月開桃花菊八月開銷金菊金鈴菊蹙線菊燕脂菊白喜容黃喜容黃笑靨白笑靨金井銀欄金井玉欄鵝兒菊棣棠菊丁香菊萬鈴菊蘇州出髙枝兒玉盆菊鐵腳黃鈴黑葉兒輕黃菊黃纒枝白纒枝勝金黃賽金錢早紫菊四月旱蓮菊團圓菊柳條菊枝亭菊枝梗甚長用杖子撑即籬菊一丈黃鞍子菊雙心兒牽長碧蟬菊青色鈸兒菊一種紫梗開早一種青梗開晚越中品類山隂菊隱史鑄撰譜以下諸菊之次第所排近似失序此蓋粗以形色之髙下而為列非徒狥名而已比之前後二目不同凡菊之開其形色有三節不同謂始中末也今譜中所紀多紀其盛開之時黃色勝金黃花頭大過折二錢明黃瓣青黃心瓣有五六層花片比大金黃差小上有細脉枝杪凡三四花一枝之中有少從蘂顔色鮮明玩之快人心目大金錢開遲大僅及折二心瓣明黃一色其瓣五層此花不獨生於枝頭乃與葉層層相間而生香色與態度皆勝金絲菊花頭大過折二深黃細瓣凡五層一簇黃心甚小與瓣一色顔色可愛名為金絲者以其花瓣顯然起紋綹也十月方開此花根荄極壯小金黃花頭大如折二心瓣黃皆一色開未多日其瓣鱗鱗六層而細態度秀麗經多日則面上短瓣亦長至於整整而齊不止六層蓋為狀先後不同也如此緑葉頗小密友菊花頭大過折三明黃闊片花瓣形色不在諸品之下初開時長短不齊開及其盛乃齊至於六層其中如抽芽數條短短小心與瓣為一色狀如春間黃密友花窠株低矮緑葉最繁密見霜則周圍葉緑變紫色橙菊亦名金毬菊此品花瓣與諸菊絶異含蘂之時狀如粉團菊黃色不甚深其瓣成筒排豎生於萼上後乃開作小片婉孌至於成團衆瓣之下又有統裙一層承之亦猶橙皮之外包也其中無心愚齊云據愚視之橙黃菊與粉團菊必是一種但橙小粉大及色異耳大金黃花頭大如折三錢心瓣黃皆一色其瓣五六層花片亦大一枝之杪多獨生一花枝上更無從蘂緑葉亦大其梗濃紫色側金盞此品類大金黃其大過之有及一寸八分者瓣有四層皆整齊花片亦闊大明黃色深黃心一枝之杪獨生一花枝中更無從蘂名以側金盞者以其花大而重欹側而生也緑葉亦大其梗淡紫小金錢開早大於小錢明黃瓣深黃心其瓣齊齊三層花瓣展其心則舒而為筒御愛黃花頭大如小錢淡黃色其狀與御袍黃相類但此花瓣頗細凡五六層向上二三層黃色鮮明向下層則色帶微白層層鱗次不齊心乃明黃色其細小料十餘縷耳御袍黃花頭大如小錢淡黃色其狀略觀之與御愛黃相類但此花瓣頗闊凡五層此色上下層同上下層層稍齊心乃深黃色比之御愛黃細視則不同况此心又有大小之别黃佛頭花頭不及小錢明黃色狀如金鈴菊中外不辨心瓣但見混同純是碎葉突起甚髙又如白佛頭菊之黃心也九日黃大如小錢黃瓣黃心心帶微青瓣有三層狀類小金錢但此花開在金錢之前也開時或有不甚盛者惟地土得宜方盛緑葉甚小枝梗細瘦黃寒菊花頭大如小錢心瓣皆深黃色瓣有五層甚細開至多日心與瓣併而為一不止五層重數甚多聳突而髙其香與態度皆可愛狀類金鈴菊差大耳荔枝菊花頭大於小錢明黃細瓣層層鱗次不齊中央無心鬚乃簇簇未展小葉至開遍凡十餘層其形頗圓故名荔枝菊此香清甚姚江士友云其花黃狀似楊梅茱萸菊闕末利菊花頭巧小淡淡黃色一蘂只十五六瓣或至二十片一㸃緑心其狀似末利花不類諸菊葉即菊也每枝條之上抽出十餘層小枝枝皆簇簇有蘂艾菊闕金鈴菊花頭甚小如鈴之圓深黃一色其幹之長與人等或言有髙近一丈者可以上架亦可蟠結為塔故又名塔子菊一枝之上花與葉層層相間有之不獨生於枝頭緑葉尖長七出凡菊葉多五出例皆不該甘菊陶隱居云菊有兩種一種莖紫氣香而味甘一種青莖作蒿艾氣而味苦日華子亦云菊有兩種花大氣香莖紫者為甘菊花小氣烈莖青者名野菊楊損之云甘者入藥苦者不任史氏譜云甘菊色深黃野菊枝柯細瘦劉氏譜云甘菊深黃單葉閭巷人能識之固不待記而知竊謂古菊陶淵明等採於東籬泛於酒斚疑皆今之甘菊也今據本草諸書所載二者較然可見矣滴滴金夏菊也花頭巧小或有如折二大者蓋所産之地不同也花瓣最細凡二三層明黃色心乃深黃中有一㸃微緑自六月開至八月俗說遍地生苗者由花梢頭露水滴而出也故名滴滴金豫嘗與好事者斸地驗其根其根即無聯屬方知此說不妄野菊亦有三兩種花頭甚小單層心與瓣皆明黃色枝莖極細多依倚他草木而長上聲緑葉七出又有一種其花初開心如旱蓮草開至涉日則旋吐出蜂鬚周圍蒙茸然如蓮花鬚之狀枝莖頗大緑葉五出吾鄉能仁寺側府城墻上最多白色九華菊此品乃淵明所賞之菊也今越俗多呼為大笑其瓣兩層者本曰九華白瓣黃心花頭極大有闊及二寸四五分者其態異常為白色之冠香亦清勝枝葉疏散九月半方開昔淵明嘗言秋菊盈園其詩集中僅存九華之一名今以重瓣大笑為九華此得於諸士友之說凡畦丁率皆不知若姚江士夫又稱九華為大佛頂然或謂九華緑葉與諸菊葉不相類疑非菊之正品愚嘗觀本草圖經所晝鄧州菊衡州菊此二名品亦皆是混淨之葉未見其有出稜角者且古人别菊惟在於臭味豈拘拘論其葉哉大笑菊白瓣黃心夲與九華同種其單層者為大笑花頭差小不及兩層者之大其葉類栗木葉亦名栗葉菊佛頂菊大過折二或如折三單層白瓣突起淡黃心初如楊梅之肉蕾後皆舒為筒子狀如蜂窠末後突起甚髙又且最大枝幹堅粗葉亦粗厚又名佛頭菊一種每枝多直生上只一花少有旁出枝花一種每一枝頭乃分為三四小枝各一淮南菊先得一種白瓣黃心瓣有四層上層抱心微帶黃色下層黯淡純白大不及折二枝頭一簇六七花後又得一種淡白瓣淡黃心顔色不相染心瓣有四層一枝攢聚六七花其枝杪六花如六面仗鼓相抵然惟中央一花大於折三餘者稍小豫視之疑非一種園丁乃言所産之地力有不同也大率此花自有三節不同初開花面微帶黃色中節變白至十月開過見霜則變淡紫色且初開之瓣只見四層開至多日乃至六七層花頭亦加大焉酴醿菊闕木香菊大過小錢白瓣淡黃心瓣有三四層頗細狀如春架中木香花又如初開纒枝白但此花頭舒展稍平坦耳亦有黃色者粉團菊亦名玉毬菊此品與諸菊絶異含蘂之時淺黃色又帶微青花瓣成筒排竪生於萼上其中央初看一似無心狀如橙菊盛開則變作一團純白色其形甚圓其香頗烈至白瓣雕謝方見瓣下有如心者甚大其白瓣皆匼匝出於上也經霜則變紫色尤佳緑葉甚粗其梗柔弱原本闕開則短至多日則䟎出近於齊長巧小淡黃心瓣凡五層開至末後則瓣增多至於七層側看如千葉白蓮其態秀麗枝條婀娜其葉稍密亦名甌子菊見霜則色變淡紫玉甌菊或言甌子菊即纒枝白菊也其開層數未及多者以其花瓣環拱如甌盞之狀也至十月經霜則變紫色金盞銀臺大如折二此以形色而為名也惟初開似之爛開則其狀輒變寒菊大過小錢短白瓣開多日其瓣方增長明黃心心乃攢聚碎葉突起頗髙枝條柔細十月方開徘徊菊淡白瓣黃心色帶微緑瓣有四層初開時先吐瓣三四片只開就一邊未及其餘開至旬日方及周遍花頭乃見團圓按字書徘徊為不進此花之開亦若是矣其名不妄十月初方開或有一枝花頭多者至攢聚五六顆近似淮南菊銀盤菊白瓣二層黃心突起頗髙花頭或大或小不同想因其地有肥瘠之故也輪盤菊闕紅色桃花菊又名桃紅菊花瓣如桃花粉紅色一蘂凡十三四片開時長短不齊經多日乃齊其心黃色內帶微緑此花嗅之無香惟撚破聞之方知有香至中秋便開開至十餘日漸變為白色或生青蟲食其花片則衰矣其緑葉甚細小繡菊闕石菊即古之大菊也花瓣五出有紫色者有深紅色者有深紅粉緑者各有種也其萼長而小其莖有節其葉亦頗類竹故又名石竹諸色皆自五月而開或有開遲者至七月方開惟紫色者開至八九月方衰衰即結實或云石菊結實為蘧麥愚按爾雅云大菊蘧麥也本草云瞿麥一名大菊陶隱居云一莖生細葉花紅紫赤可愛子頗似麥日華子云又名石竹本草圖經曰生泰山及淮甸今處處有之苗髙一尺以來葉尖小二月至五月開七月結實頗似麥故名之豫以本土所産石菊參照爾雅本草所言大菊之形色固相似矣然木土所産者初未審有實無實為疑遂問諸老圃皆云未嘗有結實者至甲辰八月豫於僧舍見紫色一種就摘花瓣脫盡一殘萼撚破驗其子之有無其中果有一粒如細麥者存焉粒中仍有如掐之一痕易為辨認次以摘花瓣未脫者一萼亦撚破驗之其中所存者與前一同陶隱居又云立秋採實實中子至細故豫今撚破其萼以視實復撚破其實以視中有何物果見有如蝦子者細不可數也豫初為老圃所惑故詳記之按劉蒙說疑曰瞿麥為大菊此乃妄濫竊名者皆所不取愚齊亦云此品石菊初以其花與蘂比之諸品不同且顔色夭冶兼乏芬馥清致當以格外菊處之亦列此名於濫號品中後考結實有據乃知即古之大菊也竊以爾雅本草既載其名其來也遠以是論之非所宜輕於是升於正品紅色之後云濫號孩兒菊白瓣黃心其狀與諸菊迥然不同自七月開至九月其葉甚纎按劉氏譜其後叙遺乃言孩兒菊粉紅色如此則比越中所有者不同也按史氏譜入此於紅紫品中愚今以本土所出者品格最下兼之無香可取故降於是也或言此花與葉既不類菊而世俗皆呼為孩兒菊者何也豫意其名以孩兒者為品卑微之謂也呼以為菊者敷榮能久之謂也或謂此花本名鵝兒菊假名春菊蒿菜花是也三月末開花頭大及二寸金彩鮮明不減於菊東嶽社㑹日人取以粧花檐花籃即此物也紫菊馬蘭花是也八九月開大觀本草云生澤傍北人見其花呼為紫菊以其花似菊而紫也玉峯先生汪擇善詩集又以旱蓮亦名紫菊有詩一篇愚竊謂此二花其物性不同以馬蘭花為菊而馬蘭亦有療疾之功使其名益著可也以旱蓮為菊胡不知有害人之毒事見博聞録黜其名可也觀音菊天竺花是也此非南天竺或呼為落帚花亦非也落帚别是一種自五月開至七月花頭細小其色純紫枝葉如嫩柳其幹之長與人等或呼為觀音菊蓋取錢塘有天竺觀音之義也繡線菊厭草花是也花頭碎紫成簇而生心中吐出素縷如線之大自夏至秋有之俗呼為厭草花或云若人帶此花賭博則獲其勝故名之古有厭勝法列諸譜外之菊一十名愚皆記其所得之自今盡類入卷首之品目九華菊見靖節先生集此一品今新入越譜凌風菊黃色見山谷詩柑子菊黃色見陳後山詞楊妃裙黃色見徐仲車詩蠟梅菊見聞人善言菊鄉公暇集朝天菊見洪氏瓊野録珠子菊白色見本草注云南京有一種開小花花瓣下如小珠子丹菊見初學記嵇含菊銘云煌煌丹菊暮秋彌榮鷺鷥菊士友云嚴州多菊此品嚴州有之花如茸毛純白色中心有一叢簇起如鷺鷥頭襄陽紅士友云並蒂雙頭亦一種菊也九江彭澤有之今榮王府皇弟大王居邸之側有園曰瓊圃池曰瑤沼皆賜御書為匾如園內異菊尤為不少但未得其名今姑闕其左當俟他日列之百菊集譜卷二
