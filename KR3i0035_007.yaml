body:
  text: 百菊集譜補遺序前編始成愚乃標之為百菊集譜因同里判簿兆偉伯見之乃裒以佳名曰菊史續又見古人江奎詩有他年我若修花史之句髙疏寮有竹史之作但鑄才疏識淺所愧不足聨芳於前賢乃者物色府察盧舜舉諱選録示黃華傳近又䝉同志陸景昭假及蘜先生傳今故併行校正列於補遺卷端戲表此編濫有稱史之名耳峕淳祐庚戌嵗季春吉旦愚齊史鑄顏甫識
