body:
  text: 百菊集譜卷一宋史鑄撰洛陽品類鄞江周師厚愚齋云公因倅洛陽作洛陽花木記愚今於記中惟摭取菊名列於此若乃諸形狀據元本皆不該菊單葉金鈴菊紫榦子萬鈴菊毬子菊鷄冠菊地棠菊千葉大黄菊五色菊粉紅菊碧菊千葉晩紅菊黄簇菊柿葉菊青心菊葉紅菊黄窠廷子探白子白菊六月紫菊紅香菊釵頭菊紫菊亦謂之旱蓮金錢菊一名夏菊川金錢深紅色單葉川剪金虢地品類彭城劉蒙撰譜愚齋云公因至伊水旅寓見菊作此叙曰草木之有花浮冶而易壊凡天下輕脆難久之物者皆以花比之宜非正人達士堅操篤行之所好也然余嘗觀屈原之為文香草龍鳳以比忠正而菊與菌桂荃蕙蘭芷江蘺同為所取又松者天下嵗寒堅正之木也而陶淵明乃以松名配菊連語而稱之夫屈原淵明實皆正人達士堅操篤行之流至於菊猶貴重之如此是菊雖以花為名固與浮冶易壊之物不可同年而語也且菊有異於物者獨以秋花悦茂於風霜搖落之時此其得時者異也云云説疑曰或謂菊與苦薏有兩種疑今譜中或有非菊者也然余嘗讀陶隠居之説以謂莖紫色青作蒿艾氣為苦薏今余所記菊中雖有莖青者然而為氣香味甘枝葉纎少或有味苦者而紫色細莖亦無蒿艾氣今人間相傳為菊其已乆矣故未能輕取舊説而棄之也日華子曰花大者為甘菊花小而苦者為野菊若種園蔬肥沃之處復同一體是小可變而為甘也如是則單葉變而為千葉亦有之矣若夫馬藺為紫菊瞿麥為大菊烏喙苗為鴛鴦菊蔙覆花為艾菊與其他妄濫而竊菊名者皆所不取云愚齋云鮦陽居士所編復雅詞云鴛鴦菊乃豆蔲花也其花類百合而小比牽牛花差大紅紫色中心有雙須須之端為雙鴛鴦之形其葉如菊葉而極大淮南二三月開花定品曰或問菊奚先曰先色與香而後態然則色奚先曰黄黄者中之色其次莫若白陳藏器云白菊生平澤花紫者白之變紅者紫之變也此紫所以為白之次而紅所以為紫之次或曰花以艷媚為悦而子以態為後歟曰吾嘗聞於古人矣妍卉繁花為小人而松竹蘭菊為君子安有君子而以態為悦乎至於具香與色而又有態是猶君子而有威儀也菊之黄者未必皆勝而置于前者重其色也菊之白者未必皆劣而列于中者次其色也龍腦菊一名小銀臺出京師類金萬鈴而葉尖其色類紫鬱金而外葉純白其香氣芬烈似龍腦其中稱葉者謂花頭上葉也非枝葉之葉定品云菊有名龍腦者具色與香而態不足者也然余以此為之冠者亦君子貴其質焉新羅菊一名玉梅一名倭菊出海外千葉純白長短相次而花葉尖薄鮮明瑩徹若瓊瑶然都勝菊出陳州鵝黄千葉葉形圓厚有雙紋而内外大小重疊相次凡菊無態度者枝葉累之也此菊細枝少葉嫋嫋有態故以都勝目之御愛菊出京師或云出禁中一名笑靨一名喜容淡黄千葉葉有雙紋齊短而闊葉端有兩缺内外鱗次玉毬菊出陳州多葉白花近蘂㣲有紅色花外大葉有雙紋瑩白齊長而蘂中小葉如剪茸以玉毬目之者以其有圓聚之形也玉鈴菊純白千葉中有細鈴金萬鈴深黄千葉而葉有鐸形或有花宻枝偏者謂之鞍子菊實與此花一種大金鈴深黄有鈴如鐸形花為五出細花下有大葉承之銀臺菊出洛陽葉有五出而下有雙紋白葉承之初疑與龍腦菊一種但花形差大且不甚香棣棠菊出西京深黄雙紋多葉自中至外長短相次如千葉棣棠狀大於諸菊一枝叢生至十餘朶顔色鮮好蜂鈴菊千葉深黄花形圓小而中有鈴葉擁聚蜂起細視若有蜂窠之狀鵝毛菊淡黄纎細如毛生於花萼上自内自外葉皆一等但長短上下有次爾毬子菊深黄千葉尖細重疊皆有倫理一枝之杪叢生百餘花若小毬諸菊最小無過此者夏金鈴出西京開以六月深黄千葉與金萬鈴相類而花頭瘦小不甚鮮茂蓋以生非時故也秋金鈴出西京深黄雙紋重葉花中細蘂皆出小鈴萼中其萼亦如鈴葉金錢菊出西京深黄雙紋重葉似大金菊而花形圓齊頗類滴滴金鄧州黄單葉雙紋深於鵝黄淺於鬱金中有細葉出鈴萼上形似鄧州白但差小爾愚齋云本草圖經有鄧州菊花薔薇菊深黄雙紋單葉如野薔薇有黄細蘂出小鈴萼中枝榦差細葉有支股而圓黄二色鵝黄雙紋多葉一花之間自有深淡兩色甚類薔薇菊惟形差小近蘂多有亂葉甘菊生雍州川澤深黄單葉閭巷之人且能識之固不待記而後見也余竊謂古菊陶淵明張景陽謝希逸潘安仁等或愛其香或詠其色或採於東籬或泛於酒斚疑皆今之甘菊也酴醿菊出相州純白千葉自中至外長短相次花之大小正如酴醿玉盆菊出滑州多葉黄心内深外淡而下有闊白大葉連綴承之有如盆盂中盛花狀鄧州白單葉雙紋白花中有細蘂出鈴萼中葉皆尖細相去稀疎香比諸菊甚烈蓋鄧州菊潭所出白菊單葉白花蘂與鄧州白相類但花葉差闊相次圓宻而枝葉麄繁人未識者謂為鄧州白後較見其異故譜中别開鄧州白而正其名曰白菊銀盆菊出西京花中皆細鈴鈴葉之下别有雙紋白葉故謂之銀盆順聖淺紫出陳州鄧州多葉葉比諸菊最大一花不過六七葉而每葉盤疊凡三四重花葉空處間有筒葉輔之余所記菊中惟此最大夏萬鈴出鄜州開以五月紫色細鈴生於雙紋大葉之上按靈寶方曰菊花紫白陶隱居云五月採今此花紫色而開於夏是得時也秋萬鈴出鄜州千葉淺紫其中細葉盡為五出鐸形而下有雙紋大葉承之綉毬菊出西京千葉紫花花葉尖闊相次叢生如金鈴菊中鈴葉之狀荔枝菊枝紫出西京千葉紫花葉卷為筒謂花葉也凡菊鈴葉有五出皆如鐸鈴之形又有卷生為筒無尖缺者故謂之筒葉大小相間凡菊鈴并蘂皆生托葉之上葉背乃有花蕚與枝相連而此菊上下左右攅聚而生故俗以為荔枝者以其花形正圓故也花有紅者與此同名垂絲粉紅出西京千葉葉細如茸攅聚相次花下亦無托葉楊妃菊粉紅千葉散如亂茸而枝葉細小嫋嫋有態合蟬菊粉紅筒葉花形細者與蘂雜比方盛開時筒之大者裂為兩翅如飛舞狀一枝之杪凡三四花紅二色出西京千葉深淡紅叢有兩色而花葉之中間生筒葉大小相映方盛開時筒之大者裂為二三與花葉相雜比茸茸然桃花菊粉紅單葉中有黄蘂其色正類桃花開於諸菊未有之前自龍腦第一至桃花第三十五皆是依元木之次第也其間銀臺白菊桃花三種不該所開之時惟夏萬鈴開於五月夏金鈴開於六月餘三十種皆於九月開也叙遺曰余聞有麝香菊者黄花千葉以香得名有錦菊者粉紅碎花以色得名有孩兒菊者粉紅青萼以形得名有金絲菊者紫花黄心以蘂得名嘗訪於好事求於園圃既未之見故特論其名色列於記花之後補意曰余疑古之菊品未若今日之富也嘗聞於蒔花者云花之形色變易如牡丹之類嵗取其變者以為新今此菊亦疑所變也呉中品類呉門老圃史正志撰譜愚齋云公退朝歸休治圃栽菊作此叙曰菊草屬也以黄為正是以槩稱黄花所宜貴者苗可以菜花可以藥囊可以枕釀可以飲所以髙人隱士籬落畦圃之間不可無此花也陶淵明植於三徑采於東籬裛露掇英汎以忘憂鍾㑹賦以五美謂圓華髙懸準天極也純黄不雜后土色也早植晩發君子徳也冒霜吐頴象勁直也盃中體輕愚按歐陽詢藝文類聚所引作流中輕體神僊食也其為所重如此然品類有數十種而白菊一二年多有變黄者余在三水植大白菊百餘株次年盡變為黄花云云黄大金黄心宻花瓣大如大錢小金黄心㣲紅花瓣鵝黄葉翠大如衆花佛頭菊無心中邊亦同小佛頭同上㣲小又云疊羅黄金墪菊比佛頭頗瘦花心㣲窪金鈴菊心㣲青紅花瓣鵝黄色葉小又云明州黄深色御袍黄心起突色如深鵝黄淺色御袍黄中深金錢菊心小花瓣稀毬子黄中邊一色突起如毬子棣棠菊色深黄如棣棠狀比甘菊差大甘菊色深黄比棣棠頗小野菊細瘦枝柯凋衰多野生亦有白者白金盞銀臺心突起深黄四邊白樓子佛頂心大突起似佛頂四邊單葉添色喜容心㣲紅花瓣宻且大纒枝菊花瓣薄開過轉紅色玉盤菊黄心突起淡白緣邊單心菊細花心瓣大樓子菊層層狀如樓子萬鈴菊心茸茸突起花多半開者如鈴腦子菊花瓣㣲縐縮如腦子狀荼䕷菊心青黄㣲起如鵝黄淺色雜色紅紫十様菊黄白雜様亦有㣲紫花頭小桃花菊花瓣全如桃花秋初先開色有淺深深秋亦有白者芙蓉菊狀如芙蓉亦紅色孩兒菊紫萼白心茸茸然葉上有光與他菊異夏月佛頂菊五六月開色㣲紅後叙曰花有落者有不落者蓋花瓣結宻者不落盛開之後淺黄者轉白而白色者漸轉紅枯于枝上花瓣扶疎者多落盛開之後漸覺離披遇風雨撼之則飄散滿地矣云云石湖品類石湖范成大撰譜并序山林好事者或以菊比君子其説以為嵗華晼晩草木變衰乃獨奕然秀發傲睨風露此幽人逸士之操雖寂寥荒寒而味道之腴不改其樂者也神農書以菊為養性上藥能輕身延年南陽人飲其潭水皆壽百嵗使夫人者有為於當年醫國庇民亦猶是而已菊於君子之道誠有臭味哉云云黄花勝金黄一名大金黄菊以黄為正此品最為豐縟而加輕盈花葉㣲尖但條梗纎弱難得團簇作大本須留意扶植乃成疊金黄一名明州黄又名小金黄花心極小疊葉穠宻狀如笑靨花有富貴氣開早棣棠菊一名金䭔子花纎穠酷似棣棠色艷如赤金它花色皆不及蓋奇品也窠株不甚髙金陵最多疊羅黄狀如小金黄花葉尖瘦如剪羅縠三兩花自作一髙枝出叢上意度瀟灑麝香黄花心豐腴傍短葉宻承之格極髙勝亦有白者大略似白佛頂而勝之逺甚呉中比年始有千葉小金錢略似明州黄花葉中外疊疊整齊心甚大太真黄花如小金錢色鮮明單葉小金錢花心尤大開最早重陽前已爛漫垂絲菊花蘂深黄莖極柔細隨風動揺如垂絲海棠鴛鴦菊花常相偶葉深碧金鈴菊一名荔枝菊舉體千葉細瓣簇成小毬如小荔枝枝條長茂可以攬結江東人喜種之有結為浮圖樓閣髙丈餘者余頃北使過欒城其地多菊家家以盆盎遮門悉為鸞鳯亭臺之狀即此一種毬子菊如金鈴而差小二種相去不逺其大小名字出於栽培肥瘠之别小金鈴一名夏菊花如金鈴而極小無大本夏中開藤菊花宻條柔以長如藤蔓可編作屏障亦名棚菊種之坡上則垂下裊數尺如纓絡尤宜池潭之瀕愚齋按沈氏菊譜後有補遺云吉州太和有菊蔓生名一丈黄土人引以為屏十様菊一本開花形模各異或多葉或單葉或大或小或如金鈴往往有六七色以成數通名之曰十様衢嚴間花黄杭之屬邑有白者甘菊一名家菊人家種以供蔬茹凡菊葉皆深緑而厚味極苦或有毛惟此葉淡緑柔瑩味㣲甘咀嚼香味俱勝擷以作羮及泛茶極有風致天隨子所賦即此種花差勝野菊甚美本不繫花野菊旅生田野及水濱花單葉極瑣細白花五月菊花心極大每一鬚皆中空攅成一匾毬子紅白單葉繞承之每枝只一花徑二寸葉似同蒿夏中開近年院體畫草蟲喜以此菊寫生金杯玉盤中心黄四傍淺白大葉三數層花頭徑三寸菊之大者不過此本出江東比年稍移栽呉下此與五月菊二品以其花徑寸特大故列之於前喜容千葉花初開㣲黄花心極小花中色深外㣲暈淡欣然丰艷有喜色甚稱其名久則變白尤耐封殖可以引長七八尺至一丈亦可攬結白花中髙品也御衣黄千葉花初開深鵝黄大略似喜容而差疎瘦久則變白萬鈴菊中心淡黄䭔子傍白花葉繞之花端極尖香尤清烈蓮花菊如小白蓮花多葉而無心花頭疎極蕭散清絶一枝只一葩緑葉亦甚纎巧芙蓉菊開就者如小木芙蓉尤穠盛者如樓子芍藥但難培植多不能繁橆茉莉菊花葉繁縟全似茉莉緑葉亦似之長大而圓淨木香菊多葉略似御衣黄初開淺鵝黄久則淡白花葉尖薄盛開則㣲卷芳氣最烈一名腦子菊酴醿菊細葉稠疊全似酴醿比茉莉差小而圓艾葉菊心小葉單緑葉尖長似蓬艾白麝香似麝香黄花差小亦豐腴韻勝白荔枝與金鈴同但花白耳銀杏菊淡白時有㣲紅花葉尖緑葉全似銀杏葉波斯菊花頭極大一枝只一葩喜倒垂下久則㣲捲如髮之鬈佛頂菊亦名佛頭菊中黄心極大四傍白花一層繞之初秋先開白色漸沁㣲紅桃花菊多葉至四五重粉紅色濃淡在桃杏紅梅之間未霜即開最為妍麗中秋後便可賞以其質如白之受采故附白花燕脂菊類桃花菊深紅淺紫比燕脂色尤重比年始有之此品既出桃花菊遂無顔色蓋奇品也姑附白花之後紫菊一名孩兒菊花如紫茸叢茁細碎㣲有菊香或云即澤蘭也以其與菊同時又常及重九故附於菊百菊集譜卷一
