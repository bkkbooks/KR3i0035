body:
  text: 百菊集譜目録譜錄類三草木禽魚之屬卷一洛陽品類虢地品類吳中品類石湖品類卷二禁苑及諸州品類越中品類列諸譜外之名卷三種藝故事雜説方術辨疑古今詩話卷四歴代文章唐宋詩賦卷五續添此一卷胡氏譜菊名栽植事實張南軒菊賦杜甫詩以甘菊名石決卷六此卷先為五體題新詠集句詩臣等謹案百菊集譜六卷菊史補遺一卷宋史鑄撰鑄字顔甫號愚齋山隂人其書作於淳祐壬寅先成五卷越四年丙午續得赤城胡融譜乃移原書第五卷為第六卷而摭融譜為第五卷又四年庚戌更為補遺一卷觀其自題作補遺之時已改名為菊史矣而此仍題百菊集譜豈當時刋板已成不能更易耶首列諸菊品目一百三十一種附注者三十二種又一花四名一花五名者二種冠於卷端不入卷帙第一卷為周師厚劉䝉史正志范成大四家所譜第二卷為沈競譜及鑄所撰新譜三卷為種萟故事襍説方術辨疑及古今詩話四卷為文章詩賦五卷即所增胡融譜及栽植事實附以張栻賦及杜甫詩話一條六卷為鑄咏菊及集句詩補遺一卷則襍采所續得文類也書不成于一時故編次頗無體例然其蒐羅亦可謂博矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀百菊集譜序萬卉蕃廡於大地惟菊傑立於風霜中敷華吐芬出乎其類所以人皆貴之至於名公佳士作為譜者凡數家可謂討論多矣鑄晩年亦愛此成癖且欲多識其品目未免周詢博採有如元豐中鄞江周公師厚所記洛陽之菊二十有六品即洛陽花木記崇寧中彭城劉公蒙所譜虢地之菊三十有五品淳熈乙未者郎史公正志所譜吳門之菊二十有八品淳熈丙午大參范公成大所譜石湖之菊三十有六品近而嘉定癸酉吴中沈公闕乃摭取諸州之菊及上至于禁苑所有者總九十餘品以著于篇菊名篇第四亦一譜也凡此一記四譜俱行於世此外义有文保雍一譜求之未見鑄自端平至于淳祐凡七年間始得諸本且每得一本快覩諦玩竊有疑焉如九華一品此正供淵明所賞者也在昔先生所植甚多嘗以是形於九日詩序今也幾歴千載其名猶聞於杭越間流芳不絶然愚求於記譜中奈何皆闕之豈彼四方之廣土此品未嘗有邪豈道里限隔此名或呼之異邪豆羣賢作譜採訪有所未至邪胡為品目之未備吁可恠也於是就吾鄉徧涉秋園搜拾所有悉市種而植之俟其花盛開乃備述諸形色而紀之有疑而未辨則問於好事而質之夫如是則古稱九華者於斯復見矣且至於四十品若濫號假名者不與其數是為越譜至此一記五譜班班品列名曰百菊集譜今去其重複凡有百六十三名今則特加種藝與夫故事詩賦之類畢萃於此庶幾可以併廣所聞云時淳祐壬寅夏五既望愚齋史鑄序欽定四庫全書百菊集譜卷首諸菊品目九華菊名見陶淵明集今以此品居首者尊古也佛頂菊亦名佛頭菊子黄佛頂夏大佛頂小佛頂樓佛頂月佛頂御愛黄御袍黄深色淺色御衣黄勝金黄大金黄小金黄側金盞金絲菊金錢菊大金錢金小金錢金千葉小金錢單葉小錢賽錢金鈴菊亦名塔子菊金大金鈴夏金鈴秋鈴小金鈴金萬鈴夏萬鈴秋萬鈴金塾菊金盞銀臺亦名水仙菊金盞金臺金盃玉盤金井銀欄金井玉欄滴滴金夏菊也滿堂金銷金菊銷金北紫銷銀黄菊玉盤盂玉鈴菊玉甌菊玉盆菊銀盤菊輪盤菊銀臺菊銀盆菊珠子菊水晶菊玉毬菊繡毬菊毬子黄錦菊繡菊疊金黄亦名明州黄疊羅黄白疊羅垂絲菊黄色垂絲粉紅鋪茸菊蹙線菊荔枝菊白荔枝銀杏菊橙黄菊柑子菊枇杷菊宻友菊酴醿菊黄色白色木香菊黄色白色丁香菊桃花菊牡丹菊素馨菊黄色白色棣棠菊茉莉菊薔薇菊蓮花菊附荷菊芙蓉菊雞冠菊蠟梅菊松菊柿葉菊栁條菊樝子菊茱萸菊艾菊龍腦菊新羅菊黄色白色鄧州黄鄧州白明州黄泰州黄淮南菊襄陽紅大笑菊大笑亦一花名笑靨菊黄色白色喜容菊黄色白色添色喜容喜容千葉都勝菊纒枝菊黄色白色徘徊菊甘菊野菊黄色白色藤菊亦名一丈黄寒菊黄色白色春菊五月菊九日菊十月白十様菊黄二色紅二色樓子菊鞍子菊腦子菊麝香黄白麝香燕脂菊粉團菊凌風菊朝天菊月下白楊妃菊粉紅色楊妃裙黄色太真黄孩兒菊黄色白色粉紅色波斯菊鴛鴦菊鷺鷥菊鵝兒菊鵝毛菊蜂兒菊蜂鈴菊碧蟬菊合蟬菊五色菊紫菊順聖淺紫石菊其色有三故附於此丹菊九月開紅菊五月開附乾紅菊碧菊青心菊單心菊黄簇菊鐵脚黄鈴菊黑葉兒菊鈸兒菊釵頭菊右一百三十一名間於其下又有附注者三十二是總計一百六十三名也然世謂此花有七十二品若以此數求其一州之所有則不足若求於四方則逺出此數之外蓋菊之為態栽植年深茍得其宜則其間形色或有變易者故種類滋多命名非一殆不可以數計也况遐方異俗所呼不同或一品至於有三四名者以是考之則知此品目猶未免有重複也覽者當知之一種而五名藤菊一丈黄枝亭菊棚菊朝天菊一種而四名九華菊兩層者一笑菊單層者批杷菊栗葉菊凡一種有二三名者各見於逐品之下更不再表出百菊集譜卷首
