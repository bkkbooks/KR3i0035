body:
  text: 百菊集譜卷三宋史鑄撰種藝孫真人種花法愚今於此只録種菊一事三月穀雨後種紅葉菊千葉甘菊金鈴菊紫幹菊千葉白菊紫菊掃葉菊黃簇菊青心柿菊五色菊蓮子菊大黃金菊范石湖云吳下老圃伺春苗尺許時掇去其顛數日則岐出兩枝又掇之每掇益岐至秋則一幹所出數百千朵婆娑團欒如車蓋熏籠矣人力勤土又膏沃花亦為之屢變沈莊可譜云吳門菊自有七十二種春分前以根中發出苗裔用手逐枝柯擘開每一柯種一株後長及一尺則以一尺髙籃蓋覆每月遇九日有出籃外者則去其腦至秋分則不去矣夏間每日清水澆灌遇夜去其籃承露至早復蓋不可使乾枯如此之後結蘂則平齊矣沈譜云豫在豫章見菊多有佳者嘗問之園丁則云菊每嵗以上已前後數日分種失時則花少而葉多如不分置他處非惟叢不繁茂往往一根數幹一幹之花各自别樣所以命名不同菊開過以茅草裹之得春氣則其舊年柯葉復青漸長成其樹但次年不著花第二年則接續著花仍不畏霜矣梅雨時收菊叢邊小株分種俟其茂則摘去心苗欲其成小叢也秋到則不摘見瑣碎録後二段同黃白二菊各披去一邊皮用麻皮扎合其開花則半黃半白菊花大蘂未開逐蘂以龍眼殼罩之至欲開時隔夜以硫黃水灌之次早去其罩即大開大笑菊及佛頂菊御愛黃至榖雨時以其枝插於肥地亦能活愚嘗試之至秋亦著花種菊所宜向陽貴在髙原其根惡水不宜久雨久雨可於根傍加泥令髙以泄水分種小株宜以糞水酵土而㙲之則易盛按劉君蒙亦有栽鉏糞養之說菊宜種園蔬內肥沃之地如欲其淨則澆㙲捨肥糞而用河渠之泥種菊之地常要除去蜒蚰則苗葉免害故事續齊諧記汝南桓景隨費長房遊學數年長房忽謂之曰九月九日汝家有災厄可速去令家人各作絳囊盛茱萸繫臂登髙飲菊花酒禍乃可消景如其言舉家登山夕還見牛羊雞犬皆暴死焉魏文帝與鍾繇書云嵗往月來忽焉九月九日九為陽數而日月並應俗嘉其名以為宜於長久故以享宴髙㑹是月律中無射言羣草庶木無有射地而生於芳菊紛然獨榮榮一作秀非夫含乾坤之淳和體芬芳之淑氣孰能如此故屈原悲冉冉之將老思餐秋菊之落英輔體延年莫斯之貴謹奉一束以助彭祖之術檀道鸞續晉陽秋陶潛九月九日無酒於宅籬畔菊叢中摘花盈把而坐悵望久之見白衣人至乃江州太守王𢎞送酒即便就酌醉而後歸昭明太子撰傳作滿手把菊唐書李適為學士凡天子饗㑹游豫唯宰相及學士得從秋登慈恩浮圖獻菊花酒稱壽唐韋表微授監察御史裏行不樂曰爵祿譬滋味也人皆欲之吾年五十拭鏡㨵白冒游少年間取一班級不見其味也將為松菊主人不愧陶淵明云唐韋綬德宗時為翰林學士以心疾還第九月九日帝作黃菊歌顧左右曰安可不示韋綬即遣使持往綬遽奉和附進列仙傳文賔取嫗數十年輒棄之後嫗老年九十餘續見賔年更壯拜泣至正月朝㑹鄉亭西社中賔教令服菊花地膚桑上寄生松子以益氣嫗亦更壯復百餘嵗神仙傳康風子服菊花柏實乃得仙名山記道士朱孺子吳末入玉笥山服菊花乘雲升天雜說禮記月令季秋之月鞠有黃華注記時候也周禮王后六服中有鞠衣注黃衣也色如鞠塵象桑葉始生禮記季春天子薦鞠衣于先帝注鞠衣黃桑之服陸德明禮記釋文鞠衣居六切如菊華也又去六切如麴塵爾雅蘜治蘠注今之秋華菊山海經中山經云岷山之首曰女兒之山其草多菊陸農師埤雅云鞠草有華至此而窮焉故謂之鞠一曰鞠如聚金鞠而不落故名鞠本草云菊花一名節華一名日精一名更生一名周盈一名傅延年一名隂成愚齊云謂採後隂乾取成日合藥故名之應劭風俗通曰南陽酈縣有甘谷谷水甘美云其山上大有菊水從山上流下得其滋液谷中有三十餘家不復穿井悉飲此水上壽百二三十中百餘下七八十者考之本草菊花輕身益氣故也司空王暢太尉劉寬太尉袁隗為南陽太守聞有此事令酈縣月送水二十斛用之飲食諸公多患風眩皆得愈抱朴子仙藥篇云南陽酈縣山中有甘谷水谷水所以甘者谷上左右皆生甘菊菊花墮其中歷世彌久故水味為變其臨此谷居民皆不穿井悉食甘谷水食者無不老壽髙者百四五十嵗下者不失八九十無夭年人得此菊力也荆州記酈縣菊水太尉胡廣久患風羸弱汲此水後疾遂瘳年近百嵗非唯天壽亦菊延之此菊甘美廣後收菊播之京師處處傳植東漢胡廣傳注引盛𢎞之荆州記曰菊水出穰縣芳菊被涯水極甘香谷中皆飲此水上壽百二十如七八十者猶以為夭太尉胡廣所患風疾休沐南歸恆飲此水後疾遂瘳年八十二薨愚齊云按九域志鄧州南陽郡有穰縣不該酈縣按廣韻酈縣在南陽西京雜記戚夫人侍兒賈佩蘭說在宫內時九月九日佩茱萸食蓬餌飲菊花酒令人長壽菊花舒時并採莖葉雜黍米釀之密封置室中至來年九月九日始熟就飲焉寶櫝記云宣帝異國貢紫菊一莖蔓延數畝味甘食者至死不饑渴風土記日精治蘠皆菊之花莖别名也生依水邊其花煌煌霜降之節唯此草盛茂九月律中無射俗尚九日而用候時之草也仙書茱萸為辟邪翁菊花為延壽客故假此二物以消陽九之厄爾唐馮贄雲仙散録引蠻甌志云白樂天方入關劉禹錫正病酒禹錫乃餽菊苗齏蘆蔔鮓換取樂天六班茶二囊以醒酒牧豎閒談云蜀人多種菊以苗可入菜花可入藥園圃悉植之郊野人多採野菊供藥肆頗有大誤真菊延齡野菊瀉人孟元老東京夢華録重九都下賞菊菊有數種有黃白色蘂若蓮房曰萬鈴菊粉紅色曰桃紅菊白而檀心曰木香菊黃色而圓曰金鈴菊純白而大曰喜容菊無處無之酒家皆以菊花縛成洞户陳欽甫提要録東坡云嶺南氣候不常菊花開時即重陽凉天佳月即中秋不須以日月為斷也十月初吉菊始開乃與客作重九因次韻淵明九月九日詩云今日我重九誰謂秋冬交黃花與我期草中實後凋香餘白露乾色映青松髙苕溪漁隱曰江浙間每嵗重陽往往菊亦未開不獨嶺南為然蓋菊性耿介須待草木黃落方於霜中獨秀東坡仇池筆記云菊黃中之色香味和正花葉根實皆長生藥也北方隨秋早晚大略至菊有黃花乃開嶺南冬至乃盛地暖百卉造作造一作迭無時而菊獨後開考其理菊性介烈不與百卉並盛衰須霜降乃發嶺南常以冬至微霜也仙姿髙潔如此宜其通仙靈也東坡記菊帖云嶺南地暖而菊獨後開考其理菊性介烈須霜降乃發而嶺海常以冬至微霜故也吾以十一月望與客泛菊作重九書此為記東坡贈朱遜之詩序云元祐六年九月與朱遜之㑹議于潁或言洛人善接花嵗出新枝而菊品尤多遜之曰菊當以黃為正餘可鄙也沈譜云如周濂溪則以菊為花之隱逸者稱之沈譜云舊日東平府有溪堂為郡人游賞之地溪流石崖間至秋州人泛舟溪中採石崖之菊以飲每嵗必得一二種新異之花九域志鄧州南陽郡土貢白菊三十斤本草圖經有衡州菊花鄧州菊花越州圖經菊山在蕭山縣西三里山多甘菊吳致堯九疑考古云舂陵蒨無菊自元次山始植沈譜云次山作菊圃記云在藥品是為良藥為蔬菜是佳蔬也洪景盧夷堅辛志成都府學學有神曰菊花仙相傳為漢宫女諸生求名者往祈影響神必明告愚齊云漢宫女謂在漢宫飲菊花酒者花或云成都府漢文翁石室壁間畫一婦人手持菊前對一猴號菊花娘子大比之嵗士人多乞夢頗有靈異王龜齡云鄂渚少黃花有白菊釋典云拘蘇摩華其華白色大小如錢似此白菊也按諸字書菊之字有五其體雖異而用則同見說文蘜見爾雅亦見說文鞠見三禮菊見篇韻今人多從簡用之愚齊云諸菊得名或以色或以香或以形狀其義非一皆明而可知惟九華一古名初莫知其義今按晉宋以前淵明而上漢有九華殿魏有九華臺二者於菊皆不聞有事迹相關惟真誥載吳有趙廣信至魏末賣藥鍊九華丹丹成遂乘雲駕龍登天又漢天師家傳云真人入鹿堂山煉九鼎神丹遷平蓋山煉九華大藥注曰服此成仙愚意其菊之為名必比擬於此何則蓋白菊久服則輕身延壽亦至成仙故也士友云恐此菊出於九華山故有是名愚竊謂不然且池州九華之名始於李白於晉時絶無干涉方術神農本草云菊花味苦主頭風頭眩目淚出惡風濕痺久服利血氣輕身延年名醫别録云菊花味甘無毒療腰痛去來陶陶除胸中煩熱陶隱居云菊有兩種一種莖紫氣香而味甘葉可作羮食者為真一種青莖而大作蒿艾氣味苦不堪食者名苦薏其花相似唯以甘苦别之爾又有白菊亦主風眩能令頭不白仙經以為妙用陳藏器云白菊味苦主風眩變白不老益顔色楊損之云甘者入藥苦者不任日華子云菊花治四肢遊風利血脉并頭痛作枕明目葉亦明目生熟並可食菊有兩種花大氣香者為甘菊花小氣烈者名野菊然雖如此園蔬內種肥沃後同一體本草圖經曰菊花生雍州川澤及田野今處處有之以南陽菊潭者為佳初春布地生細苗夏茂秋花冬實正月採根三月採葉五月採莖九月採花十一月採實皆隂乾用南陽菊亦有黃白二種今服餌家多用白者白菊酒法春末夏初收軟苗隂乾搗末空腹取一方寸七和無灰酒服之若不飲酒者但和羮粥汁服之亦得秋八月合花收暴乾切取三大斤以生絹囊盛貯浸三大㪷酒中經七日服之今諸州亦有作菊花酒者其法得於此玉函方云王子喬變白增年方用甘菊三月上寅日採名曰玉英六月上寅日採名曰容成九月上寅日採名曰金精十二月上寅日採名曰長生長生者根莖是也四味並隂乾百日取等分以成日合搗千杵為末酒調下一錢匕以蜜丸如桐子大酒服七丸一日三服百日身輕潤澤服之一年髮白變黑服之二年齒落再生服之三年八十嵗老人變為童兒神效以上並見大觀本草抱朴子劉生丹法用白菊汁蓮花汁和丹蒸之服一年壽五百嵗千金方常以九月九日取菊花作枕袋枕頭大能去頭風明眼目附陳欽甫九日詩云菊枕堪明服茱囊可辟邪千金方九月九日菊花末臨飲服方寸匕主飲酒令人不醉聖惠方云治頭風用九月九日菊花暴乾取家糯米一斗蒸熟用五兩菊花末如常醖法多用細麵麴酒熟即壓之去滓每暖一小盞服之附郭元振秋歌云辟惡茱萸囊延年菊花酒與子結綢繆丹心此何有原闕味子菴䕡子地膚子烏麻子牡荆子是也愚因此二說遍問園翁與夫士友皆言菊無結實者愚又遵承前賢之說於十一月直至月盡親採肥壤所植之菊挼其花心以驗其實之有無亦無所見但恐遐方異域或有之也當俟博物决其疑焉甘菊野菊二說愚采取本草諸書已該於越譜中其說雖較然可見然世俗或採城墻郊野所産之菊以為宜入藥有貨於藥肆而用者又據司馬溫公甘菊詩云野菊細瑣物籬間私自全徒因氣味殊不為庖人捐采升白玉堂薦以黃金盤以此詩觀之乃知甘菊或有出於野者亦可用也牧豎閒談云郊野人多採野菊供藥肆大誤真菊延齡野菊㵼人愚今以古今之人去取不同故併列之用之者不可不審越俗言夏菊初生謂苗之時例自陳根而出至秋遍地沿多者由花梢頭露滴入土却生新根而出故名滴滴金愚初未之信遂與好事者斸地驗其根果無聮屬乃見俗傳不妄也本草載神農以菊味為苦名醫以味為甘二說不同例皆療病愚意其神農取白菊言之名醫取黃菊言之愚按陶隱居與陳藏器皆言白菊療疾有功本草圖經言今服餌家多用白者又有白菊酒法抱朴子有言丹法用白菊汁九域志言鄧州以白菊入貢是皆以白菊為用也惟沈存中忘懷録有種甘菊法今所謂茶菊即甘菊也然甘菊作飲食與入藥多是黃色不曽見白者可食豈豫未之見邪愚以古今去取不同故併列之古今詩話晉羅含字君章耒陽人致仕還家階庭忽蘭菊叢生以為德行之感唐李義山菊詩陶令籬邊色羅含宅裏香又云羅含黃菊宅柳惲白蘋門唐輦下嵗時記九日宫掖間爭插菊花民俗尤甚杜牧詩云塵世難逢開口笑菊花須插滿頭歸又云九日黃花插滿頭司馬文正公九日贈梅聖俞瑟姬歌云不肯那錢買珠翠任教堆插階前菊西清詩話嘉祐中歐陽公見王荆公詩黃昏風雨暝園林殘菊飄零滿地金笑曰百花盡落獨菊枝上枯耳因戲曰秋英不比春花落為報詩人子細看後人以韻協之改看作吟荆公聞之怒曰是定不知楚詞夕餐秋菊之落英歐陽九不學之過也樂菴先生李侍御名衡語録云韓魏公嘗言保初節易保晚節難在北門九日燕諸曹有詩莫羞老圃秋容淡魏公言行録作不羞要看閒花晚節香言行録作且看寒花先生深敬此語嘗大書于壁以為晚節之規沈譜云徐仲車最好菊即西籬下多種之花至冬月猶有存者名曰晚菊公常自比陶淵明種菊之所雖東西相反論其所以樂則無以異也有菊詩云楊妃只有黃裙在且問風霜留得無所謂楊妃裙者蓋菊名也漁隱胡仔曰余嘗因庭下黃白菊相間開遂效蘇黃格作詩詠之曰何處金錢與玉錢化為蝴蝶夜翩翩青絲網住芳叢上開作秋花取意妍杜陽雜編唐穆宗時禁中花開夜有蛺蝶數萬飛集花間宫人以羅巾撲之無有獲者上令張網空中得數百遲明視之皆庫中金玉錢也陸放翁因山園草間菊數枝開席地獨酌有詩云屋東菊畦蔓草荒瘦枝出草三尺長碎金狼籍不甚摘掃地為渠持一觴日斜大醉叫墮幘野花村酒何曽擇君不見詩人跌宕例如此蒼耳林中留太白於此可見放翁愛菊之意愚齊云陶淵明和郭主簿詩芳菊開林耀青松冠巖列懷此貞秀姿卓為霜下傑愚愛霜下傑三字最佳東坡和子由所居詩粲粲秋菊花卓為霜中英今觀百注坡詩中闕而不注何諸公不省淵明詩邪苕溪漁隱曰先君題泗上秋香亭詩騷人足竒思香草比君子況此霜下傑清芬絶蘭茝自淵明妙語一出世皆師承用之可謂殘膏賸馥沾丐後人多矣愚齊云崇觀間陳子高名克有詩名集中有五月菊云黃菊有本性霜餘見幽茂名緇喻般若太史謹占候云云僧雪菴詩滿徑露漙黃般若戛簷風裊翠真如按六祖金剛經解何名般若是梵語唐言智慧也傳燈録云僧問忠國師古德云青青翠竹盡是法身鬱鬱黃花無非般若不知若為國師曰華嚴經云佛身充滿於法界普現一切羣生前隨緣赴感靡不周而常處此菩提座翠竹既不出於法界豈非法身乎般若經云色無邊故般若亦無邊黃花既不越於色豈非般若乎傳燈又云趙州或謂青青翠竹盡是真如鬱鬱黃花無非般若愚齊云菊苗不惟可為菜亦可以代茶本朝孫志舉勴有訪王主簿同泛菊茶詩云妍暖春風蕩物華初回午夢頗思茶難尋北苑浮香雪且就東籬擷嫩芽云云見鄭景龍續宋百家詩選洪景嚴遵和弟景盧邁月臺詩築臺結閣兩爭華便覺流涎過麴車户小難禁竹葉酒睡多須藉菊苗茶云云見瓊野録愚齊云菊花古人惟以泛酒後世又以入茶其事皆得於名公之詩唐釋皎然有九日與陸處士羽飲茶詩云九日山僧院東籬菊也黃俗人多泛酒誰解助茶香陸放翁冬夜與溥庵主說川食詩何時一飽與子同更煎土茗浮甘菊愚又嘗見人或以菊花磨細入於茶中啜之者文保雍菊譜中有小甘菊詩莖細花黃葉又纎清香濃烈味還甘祛風偏重山泉漬自古南陽有菊潭愚齊云此詩得於陳元靚嵗時廣記今類于此所謂保雍之譜恨未之識也愚齊云唐宋詩人詠菊罕有以女色為比其理當然或有以為比者惟韓偓歎白菊云正憐香雪披千片忽訝殘霞覆一叢還似妖姬長年後酒酣雙臉却微紅此唐人詩也又魏野有菊一絶云正當搖落獨芳妍向曉吟看露泫然還似六宫人競怨幾多珠淚濕金鈿此本朝人詩也愚竊謂菊之為卉貞秀異常獨能悅茂於風霜搖落之時人皆愛之當以賢人君子為比可也若輒比為女色豈不汚菊之清致哉故二詩愚不敢采取以入此詩選且范文正公賦云黃中通理得君子之道魏野又有詩云易把方先哲王龜齡詩云端似髙人事幽獨陸務觀詩云菊花如端人獨立凌冰霜凡此等語比類無不得其宜故諸篇今預於選中愚齊云荆公因有殘菊飄零滿地金之句歐公輒戲而非之乃有秋英不比春花落之語從而後人泥於此言竟以為不落愚竊以為未然故辨落與不落之理各有其說入於辨疑門內又取唐宋數家詩句凡言其落者併列之唐太宗殘菊詩細葉雕輕翠圓花飛碎黃又秋日詩菊散金風起趙嘏詩節過重陽菊委塵崔灝晚菊詩曉來風色清寒甚滿地繁霜更雨去聲金薛瑩十日菊詩今朝籬下見滿地委殘黃梅聖俞殘菊詩零落黃金蘂雖枯不改香蘇子由戲題菊詩更擬食根花落後一依本草太傷渠彭汝礪詩重陽黃菊花零落殆無有陸務觀菊詩碎金狼籍不堪摘又云紛紛零落中見此數枝黃愚齊云紫菊之名見於孫真人種花法又見於諸譜巾此品傳植既久故唐宋詩人稱述亦多蕭頴士菊榮篇紫英黃萼照曜丹墀杜荀鶴詩雨勻紫菊藂藂色趙嘏詩紫艷半開籬菊靜夏英公詩落盡西風紫菊花韓忠獻公詩紫菊披香碎曉霞此既出於名公稱述必是佳品也愚齊云菊之開也四季泛而有之開於三月者曰春菊前賢有詩聯云不許秋風常管束競隨春卉鬭芳菲又云似嫌九月清霜重亦對三春麗日開沈譜云春菊花小而微紅者有開於四月者張孝祥嘗有詩見詩選門開於五月者陳子髙嘗有詩開於六月者符離王常嘗有詞見芳菲集惟開於秋季者其品至多開於十月者歐陽公及王龜齡皆有詩朱希真又有詞以諸公詩詞觀之果見其所謂春菊夏菊秋菊寒菊者也雖然此當以開於秋冬者為貴開於夏者為次開於春者未必是真菊也若論其色亦有差等菊當以黃為尊以白為正以紅紫為卑楊繪詩爛紫妖紅色盡卑漁隱亦云菊春夏開者終非其時有異色者亦非其正百菊集譜卷三
